<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; background: #1e1e1e; overflow: hidden; }
    #scene { position: absolute; inset: 0; touch-action: none; cursor: grab; }
    #scene:active { cursor: grabbing; }
    #scene.placement-mode,
    #scene.placement-mode:active,
    #scene.placement-mode canvas {
      cursor: pointer !important;
    }
    #scene canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; background: rgba(30, 30, 30, 0.78); pointer-events: none;
    }
    #loading.hidden { display: none; }
    #loading.error .spinner { display: none; }
    #loading.error #loading-label {
      max-width: min(420px, 90vw); text-align: center; line-height: 1.45;
    }
    .spinner {
      width: 28px; height: 28px; box-sizing: border-box;
      border: 3px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.88);
      border-radius: 50%;
      animation: guardian-spin 0.85s linear infinite;
    }
    @keyframes guardian-spin { to { transform: rotate(360deg); } }
    #loading-label {
      color: #c8c8c8;
      font: 13px -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #camera-debug {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
      padding: 6px 10px;
      font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #e8e8e8;
      background: rgba(0, 0, 0, 0.72);
      pointer-events: none;
      white-space: pre;
      line-height: 1.35;
    }
    #camera-debug.hidden { display: none; }
    #map-dimensions {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      overflow: hidden;
    }
    #map-dimensions.hidden { display: none; }
    #map-dimensions svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    #map-dimensions .dim-line {
      stroke: #1e3a8a;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }
    #map-dimensions .dim-label {
      fill: #1e3a8a;
      font: 600 13px -apple-system, BlinkMacSystemFont, sans-serif;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 3px;
    }
  </style>
</head>
<body>
  <div id="scene"></div>
  <div id="map-dimensions" class="hidden" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg">
      <line id="dim-south-line" class="dim-line"></line>
      <line id="dim-west-line" class="dim-line"></line>
      <text id="dim-south-label" class="dim-label" text-anchor="middle"></text>
      <text id="dim-west-label" class="dim-label" text-anchor="middle"></text>
    </svg>
  </div>
  <div id="loading">
    <div class="spinner" aria-hidden="true"></div>
    <div id="loading-label">Loading scene…</div>
  </div>
  <div id="camera-debug" class="hidden" aria-hidden="true"></div>
  <script type="module">
    const loading = document.getElementById('loading');
    const loadingLabel = document.getElementById('loading-label');
    const cameraDebug = document.getElementById('camera-debug');
    const root = document.getElementById('scene');
    /** file:// loads sometimes leave `location.search` empty while `location.href` still has `?…`. */
    function guardianViewerQueryString() {
      if (location.search && location.search.length > 1) return location.search;
      const href = String(location.href || '');
      const q = href.indexOf('?');
      return q >= 0 ? href.slice(q) : '';
    }
    const params = new URLSearchParams(guardianViewerQueryString());
    window.__guardianViewerParams = params;
    const port = params.get('port') || '9002';
    const worldOverride = params.get('world') || '';
    let cameraDebugEnabled = params.get('cameraDebug') === '1';
    const groundHalfParam = parseFloat(params.get('groundHalf') || '');
    const MAP_GROUND_HALF_EXTENT_M = Number.isFinite(groundHalfParam) && groundHalfParam > 0
      ? groundHalfParam
      : 500;
    const orbitMinParam = parseFloat(
      params.get('orbitMinDistance') || params.get('orbitZoomInMax') || ''
    );
    const MAP_ORBIT_MIN_DISTANCE_M = Number.isFinite(orbitMinParam) && orbitMinParam > 0
      ? orbitMinParam
      : 50;
    /** Tiny Z offset above open-field floor top (z=0) for overlays and HUD lines — avoids z-fighting without visible float. */
    const MAP_SURFACE_LIFT_M = 0.0035;

    /** Oblique 3D view direction (unit vector); distance is computed from floor size + viewport FOV. */
    const MAP_OBLIQUE_LOOK_AT = { x: 0, y: 0, z: 0 };
    const MAP_OBLIQUE_DIRECTION = (() => {
      const dx = -1355.4;
      const dy = -56.11;
      const dz = 833.75;
      const len = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      return { x: dx / len, y: dy / len, z: dz / len };
    })();
    const MAP_ORBIT_POLAR_MIN = 0.15;
    const MAP_ORBIT_POLAR_MAX = Math.PI / 2 - 0.06;
    const MAP_FIT_MARGIN = 1.18;
    const MAP_OBLIQUE_UZ = Math.abs(MAP_OBLIQUE_DIRECTION.z);
    /** Orbit zoom-out cap (metres). Closest approach is `MAP_ORBIT_MIN_DISTANCE_M` (`orbitMinDistance` query). */
    const MAP_ORBIT_ZOOM_OUT_MAX_M = 3000;

    /** Three.js namespace from gzweb bundle (CircleGeometry / RingGeometry for zone overlays). */
    let guardianThree = null;
    let viewerSession = null;
    let cameraDebugFrame = 0;

    function setLoading(active, label = 'Loading scene…') {
      loading.classList.toggle('hidden', !active);
      loading.classList.toggle('error', false);
      loadingLabel.textContent = label;
    }

    function showLoadError(message) {
      loading.classList.remove('hidden');
      loading.classList.add('error');
      loadingLabel.textContent = message;
    }

    function sceneReady() {
      return Boolean(viewerSession?.manager?.scene?.camera && viewerSession?.manager?.scene?.controls);
    }

    function bindViewerSession(session) {
      viewerSession = session;
    }

    /** Leaflet-style: distance so square half-extent `halfM` fits viewport (perspective). */
    function perpendicularFitDistanceM(camera, vpWidth, vpHeight, halfM) {
      const half = Math.max(halfM, 0.5);
      const aspect = vpWidth / Math.max(vpHeight, 1);
      const fovRad = (camera.fov * Math.PI) / 180;
      const tanHalf = Math.tan(fovRad / 2);
      const fitH = (half / tanHalf) * MAP_FIT_MARGIN;
      const fitW = (half / (tanHalf * aspect)) * MAP_FIT_MARGIN;
      return Math.max(fitH, fitW, 4);
    }

    /** Map-base centre + top Z from `open_field_floor` when present; half-extent always from manifest (`groundHalf` query). */
    function mapBaseFrame(manager) {
      const half = MAP_GROUND_HALF_EXTENT_M;
      let cx = 0;
      let cy = 0;
      let cz = 0;
      const floorFootprint = manager ? resolveOpenFieldFloorFootprint(manager) : null;
      if (floorFootprint?.valid) {
        cx = (floorFootprint.min.x + floorFootprint.max.x) * 0.5;
        cy = (floorFootprint.min.y + floorFootprint.max.y) * 0.5;
        cz = floorFootprint.max.z;
      }
      return { cx, cy, cz, half };
    }

    function applyCameraClipPlanes(camera) {
      camera.far = Math.max(MAP_ORBIT_ZOOM_OUT_MAX_M * 4, 25000);
      camera.near = 0.5;
      camera.updateProjectionMatrix();
    }

    function clampOrbitFitDistanceM(distanceM) {
      return Math.min(MAP_ORBIT_ZOOM_OUT_MAX_M, Math.max(4, distanceM));
    }

    /** Interactive orbit limits (`minDistance` = closest the camera may orbit to the target). */
    function applyOrbitPolicyInteractive(controls) {
      controls.enabled = true;
      controls.enableRotate = true;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.screenSpacePanning = false;
      controls.minPolarAngle = MAP_ORBIT_POLAR_MIN;
      controls.maxPolarAngle = MAP_ORBIT_POLAR_MAX;
      controls.minDistance = MAP_ORBIT_MIN_DISTANCE_M;
      controls.maxDistance = MAP_ORBIT_ZOOM_OUT_MAX_M;
    }

    /** One-shot camera preset: move to fitted pose, then leave orbit controls free. */
    function commitViewportFit(manager, preset) {
      const scene2 = manager?.scene;
      if (!scene2?.camera || !scene2.controls) return false;

      const camera = scene2.camera;
      const controls = scene2.controls;
      const { cx, cy, cz, half } = mapBaseFrame(manager);
      const { width, height } = viewportSize(scene2);
      const perp = perpendicularFitDistanceM(camera, width, height, half);
      applyCameraClipPlanes(camera);

      let fitDistanceM = perp;
      controls.target.set(cx, cy, cz);
      if (preset === 'birdseye') {
        fitDistanceM = clampOrbitFitDistanceM(perp);
        camera.position.set(cx, cy, cz + fitDistanceM);
        camera.up.set(0, 1, 0);
      } else {
        const slantRange = clampOrbitFitDistanceM(perp / Math.max(MAP_OBLIQUE_UZ, 0.2));
        fitDistanceM = slantRange;
        const u = MAP_OBLIQUE_DIRECTION;
        camera.position.set(cx + u.x * slantRange, cy + u.y * slantRange, cz + u.z * slantRange);
        camera.up.set(0, 0, 1);
      }
      camera.lookAt(cx, cy, cz);
      camera.updateProjectionMatrix();
      applyOrbitPolicyInteractive(controls);
      controls.object.position.copy(camera.position);
      controls.update();

      scene2.defaultCameraPosition.copy(camera.position);
      scene2.defaultCameraLookAt.set(cx, cy, cz);
      return true;
    }

    function viewportSize(scene2) {
      const dom = scene2?.getDomElement?.() ?? root;
      return {
        width: dom.clientWidth || root.clientWidth || 1,
        height: dom.clientHeight || root.clientHeight || 1,
      };
    }

    const BASE_NAME_PATTERN = /floor|ground|field|plane|base/i;

    function emptyAABB() {
      return { valid: false, min: { x: 0, y: 0, z: 0 }, max: { x: 0, y: 0, z: 0 } };
    }

    function expandAABB(box, x, y, z) {
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) return;
      if (!box.valid) {
        box.min.x = box.max.x = x;
        box.min.y = box.max.y = y;
        box.min.z = box.max.z = z;
        box.valid = true;
        return;
      }
      box.min.x = Math.min(box.min.x, x);
      box.min.y = Math.min(box.min.y, y);
      box.min.z = Math.min(box.min.z, z);
      box.max.x = Math.max(box.max.x, x);
      box.max.y = Math.max(box.max.y, y);
      box.max.z = Math.max(box.max.z, z);
    }

    function resolveSceneObjectForModel(manager, modelMeta) {
      const sceneWrapper = manager?.scene;
      if (!sceneWrapper || !modelMeta) return null;
      const names = [modelMeta.gz3dName, modelMeta.name].filter((n) => typeof n === 'string' && n.length > 0);
      for (const name of names) {
        const obj = sceneWrapper.getByName?.(name) ?? sceneWrapper.scene?.getObjectByName?.(name);
        if (obj && typeof obj.traverse === 'function') return obj;
      }
      return null;
    }

    function unionAABBFromObject(object, box) {
      if (!object || typeof object.traverse !== 'function') return;
      object.updateWorldMatrix?.(true, false);
      object.traverse((node) => {
        if (!node.isMesh || !node.geometry) return;
        const geom = node.geometry;
        if (!geom.boundingBox) {
          geom.computeBoundingBox?.();
        }
        const local = geom.boundingBox;
        if (!local || local.isEmpty?.()) return;
        const m = node.matrixWorld.elements;
        const corners = [
          [local.min.x, local.min.y, local.min.z],
          [local.min.x, local.min.y, local.max.z],
          [local.min.x, local.max.y, local.min.z],
          [local.min.x, local.max.y, local.max.z],
          [local.max.x, local.min.y, local.min.z],
          [local.max.x, local.min.y, local.max.z],
          [local.max.x, local.max.y, local.min.z],
          [local.max.x, local.max.y, local.max.z],
        ];
        for (const [lx, ly, lz] of corners) {
          expandAABB(
            box,
            m[0] * lx + m[4] * ly + m[8] * lz + m[12],
            m[1] * lx + m[5] * ly + m[9] * lz + m[13],
            m[2] * lx + m[6] * ly + m[10] * lz + m[14]
          );
        }
      });
    }

    function aabbFootprintArea(box) {
      if (!box.valid) return 0;
      const dx = Math.max(box.max.x - box.min.x, 0);
      const dy = Math.max(box.max.y - box.min.y, 0);
      return dx * dy;
    }

    /** `open_field_floor` model only — avoids treating a stale oversized mesh as the map bounds. */
    function resolveOpenFieldFloorFootprint(manager) {
      const models = typeof manager.getModels === 'function' ? manager.getModels() : [];
      for (const modelMeta of models) {
        const name = modelMeta.name || '';
        if (name !== 'open_field_floor') continue;
        const object3d = resolveSceneObjectForModel(manager, modelMeta);
        if (!object3d) continue;
        const box = emptyAABB();
        unionAABBFromObject(object3d, box);
        if (box.valid) return box;
      }
      return null;
    }

    /** Prefer named floor/ground models; otherwise the largest XY footprint in the scene. */
    function resolveBaseFootprintAABB(manager) {
      const models = typeof manager.getModels === 'function' ? manager.getModels() : [];
      const candidates = [];
      for (const modelMeta of models) {
        const object3d = resolveSceneObjectForModel(manager, modelMeta);
        if (!object3d) continue;
        const box = emptyAABB();
        unionAABBFromObject(object3d, box);
        if (!box.valid) continue;
        candidates.push({
          box,
          area: aabbFootprintArea(box),
          name: modelMeta.name || object3d.name || '',
        });
      }
      if (candidates.length === 0) {
        const sceneRoot = manager.scene?.scene;
        if (sceneRoot && typeof sceneRoot.traverse === 'function') {
          const box = emptyAABB();
          unionAABBFromObject(sceneRoot, box);
          if (box.valid) {
            candidates.push({ box, area: aabbFootprintArea(box), name: '' });
          }
        }
      }
      if (candidates.length === 0) return null;

      const named = candidates.filter((c) => BASE_NAME_PATTERN.test(c.name));
      const pool = named.length > 0 ? named : candidates;
      return pool.reduce((best, c) => (c.area > best.area ? c : best), pool[0]).box;
    }

    function fitObliqueView(manager) {
      return commitViewportFit(manager, 'oblique');
    }

    function fitBirdseyeViewInternal(manager) {
      return commitViewportFit(manager, 'birdseye');
    }

    /** Metres outside the map edge (south / west) for the HUD dimension line. */
    const MAP_DIMENSION_EDGE_OFFSET_M = 3;

    function formatDimensionLabelMetres(lengthM) {
      if (!Number.isFinite(lengthM) || lengthM <= 0) return '—';
      const rounded = Math.round(lengthM * 10) / 10;
      if (Math.abs(rounded - Math.round(rounded)) < 0.05) {
        return `${Math.round(rounded)} m`;
      }
      return `${rounded.toFixed(1)} m`;
    }

    /** Square map tile in ENU metres — prefers live `open_field_floor` footprint, else manifest `groundHalf`. */
    function resolveMapTileSquare(manager) {
      const frame = mapBaseFrame(manager);
      const footprint = manager ? resolveOpenFieldFloorFootprint(manager) : null;
      if (footprint?.valid) {
        const sideXM = Math.max(footprint.max.x - footprint.min.x, 0.01);
        const sideYM = Math.max(footprint.max.y - footprint.min.y, 0.01);
        return {
          minX: footprint.min.x,
          maxX: footprint.max.x,
          minY: footprint.min.y,
          maxY: footprint.max.y,
          planeZ: footprint.max.z + MAP_SURFACE_LIFT_M,
          sideXM,
          sideYM,
          fromSimMesh: true,
        };
      }
      const half = frame.half;
      return {
        minX: frame.cx - half,
        maxX: frame.cx + half,
        minY: frame.cy - half,
        maxY: frame.cy + half,
        planeZ: frame.cz + MAP_SURFACE_LIFT_M,
        sideXM: half * 2,
        sideYM: half * 2,
        fromSimMesh: false,
      };
    }

    /**
     * Screen-space dimension lines (south + west edges). Survives gzweb scene reloads;
     * Three.js scene children were being dropped on each sim broadcast.
     */
    function createMapDimensionHud() {
      const hud = document.getElementById('map-dimensions');
      const southLine = document.getElementById('dim-south-line');
      const westLine = document.getElementById('dim-west-line');
      const southLabel = document.getElementById('dim-south-label');
      const westLabel = document.getElementById('dim-west-label');
      let frameId = 0;
      let active = false;
      let loopRunning = false;

      function worldToScreenPx(scene2, x, y, z) {
        const Vector3 = guardianThree?.Vector3;
        if (!Vector3 || !scene2?.camera) return null;
        const dom = scene2.getDomElement?.() ?? root;
        const rect = dom.getBoundingClientRect();
        const v = new Vector3(x, y, z);
        v.project(scene2.camera);
        if (!Number.isFinite(v.x) || !Number.isFinite(v.y) || v.z > 1) return null;
        return {
          x: (v.x * 0.5 + 0.5) * rect.width,
          y: (-v.y * 0.5 + 0.5) * rect.height,
        };
      }

      function setLine(lineEl, a, b) {
        if (!a || !b) {
          lineEl.setAttribute('visibility', 'hidden');
          return;
        }
        lineEl.setAttribute('visibility', 'visible');
        lineEl.setAttribute('x1', String(a.x));
        lineEl.setAttribute('y1', String(a.y));
        lineEl.setAttribute('x2', String(b.x));
        lineEl.setAttribute('y2', String(b.y));
      }

      function setLabel(textEl, text, a, b, offsetPx) {
        if (!a || !b) {
          textEl.setAttribute('visibility', 'hidden');
          return;
        }
        const mx = (a.x + b.x) * 0.5;
        const my = (a.y + b.y) * 0.5;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        textEl.setAttribute('visibility', 'visible');
        textEl.textContent = text;
        textEl.setAttribute('x', String(mx + nx * offsetPx));
        textEl.setAttribute('y', String(my + ny * offsetPx));
      }

      function tick() {
        if (!active) {
          loopRunning = false;
          frameId = 0;
          return;
        }
        const manager = viewerSession?.manager;
        const scene2 = manager?.scene;
        if (scene2?.camera) {
          const tile = resolveMapTileSquare(manager);
          const z = tile.planeZ;
          const off = MAP_DIMENSION_EDGE_OFFSET_M;
          const ySouth = tile.minY - off;
          const xWest = tile.minX - off;
          const southA = worldToScreenPx(scene2, tile.minX, ySouth, z);
          const southB = worldToScreenPx(scene2, tile.maxX, ySouth, z);
          const westA = worldToScreenPx(scene2, xWest, tile.minY, z);
          const westB = worldToScreenPx(scene2, xWest, tile.maxY, z);
          setLine(southLine, southA, southB);
          setLine(westLine, westA, westB);
          setLabel(
            southLabel,
            formatDimensionLabelMetres(tile.sideXM),
            southA,
            southB,
            14
          );
          setLabel(
            westLabel,
            formatDimensionLabelMetres(tile.sideYM),
            westA,
            westB,
            14
          );
        }
        frameId = requestAnimationFrame(tick);
      }

      function startLoop() {
        if (loopRunning) return;
        loopRunning = true;
        tick();
      }

      return {
        attach() {
          active = true;
          hud?.classList.remove('hidden');
          startLoop();
        },
        refresh() {
          if (active) startLoop();
        },
        detach() {
          active = false;
          loopRunning = false;
          if (frameId) {
            cancelAnimationFrame(frameId);
            frameId = 0;
          }
          hud?.classList.add('hidden');
          southLine?.setAttribute('visibility', 'hidden');
          westLine?.setAttribute('visibility', 'hidden');
          southLabel?.setAttribute('visibility', 'hidden');
          westLabel?.setAttribute('visibility', 'hidden');
        },
      };
    }

    function postZoneMessage(payload) {
      const handler = window.webkit?.messageHandlers?.guardianZones;
      if (handler) {
        handler.postMessage(JSON.stringify(payload));
      }
    }

    const mapDimensionHud = createMapDimensionHud();
    const zoneEditor = createZoneEditor(() => viewerSession?.manager?.scene, postZoneMessage);
    const postObstacleMessage = (payload) => {
      const handler = window.webkit?.messageHandlers?.guardianObstacles;
      if (!handler) {
        console.warn('guardianObstacles message handler missing', payload);
        return false;
      }
      handler.postMessage(JSON.stringify(payload));
      return true;
    };

    function postObstaclePlaceDebug(message) {
      return postObstacleMessage({ type: 'obstaclePlaceDebug', message: String(message) });
    }

    function describeSceneClickTarget(el) {
      if (!el) return 'null';
      return `${el.tagName || '?'}${el.id ? `#${el.id}` : ''}`;
    }

    /** Always logs map-tile clicks to Swift (no editorActive gate — shows JS vs Swift mode drift). */
    function installSceneTileClickProbe(obstacleEditorApi) {
      if (window.__guardianSceneTileClickProbe) return;
      window.__guardianSceneTileClickProbe = true;
      window.addEventListener('pointerdown', (event) => {
        const sceneEl = document.getElementById('scene');
        if (!sceneEl) return;
        const rect = sceneEl.getBoundingClientRect();
        if (
          event.clientX < rect.left || event.clientX > rect.right
          || event.clientY < rect.top || event.clientY > rect.bottom
        ) return;
        if (event.button !== 0) return;
        window.__guardianClickProbeActive = true;
        window.__guardianClickHits = [];
        const scene2 = viewerSession?.manager?.scene;
        const flags = typeof obstacleEditorApi?.getDebugFlags === 'function'
          ? obstacleEditorApi.getDebugFlags()
          : 'getDebugFlags unavailable';
        postObstaclePlaceDebug(
          `click TILE down — ${flags} target=${describeSceneClickTarget(event.target)} `
          + `controls.enabled=${scene2?.controls?.enabled ?? 'n/a'}`
        );
      }, true);
      window.addEventListener('pointerup', (event) => {
        if (!window.__guardianClickProbeActive || event.button !== 0) return;
        const sceneEl = document.getElementById('scene');
        if (!sceneEl) return;
        const rect = sceneEl.getBoundingClientRect();
        if (
          event.clientX < rect.left || event.clientX > rect.right
          || event.clientY < rect.top || event.clientY > rect.bottom
        ) return;
        const hits = window.__guardianClickHits || [];
        const route = hits.length
          ? hits.join(' → ')
          : 'NONE (orbit/pan or no Guardian handler)';
        postObstaclePlaceDebug(`click TILE up — route=${route}`);
        window.__guardianClickProbeActive = false;
        window.__guardianClickHits = [];
      }, true);
      postObstaclePlaceDebug('click probe installed — every left-click on #scene logs here');
    }

    function guardianRecordClickHandler(name) {
      if (!window.__guardianClickProbeActive) return;
      window.__guardianClickHits = window.__guardianClickHits || [];
      window.__guardianClickHits.push(name);
    }

    const obstacleEditor = createObstacleEditor(() => viewerSession?.manager?.scene, postObstacleMessage);
    installSceneTileClickProbe(obstacleEditor);
    let pendingZoneEditorState = null;
    let pendingObstacleEditorState = null;

    window.guardianViewer = {
      /** Snap to oblique 3D preset (full base visible); orbit stays free afterward. */
      resetDefaultView() {
        const manager = viewerSession?.manager;
        return manager ? fitObliqueView(manager) : false;
      },
      /** Snap to top-down preset (full base visible); orbit stays free afterward. */
      fitBirdseyeView() {
        const manager = viewerSession?.manager;
        return manager ? fitBirdseyeViewInternal(manager) : false;
      },
      setCameraDebugEnabled(enabled) {
        cameraDebugEnabled = Boolean(enabled);
        if (cameraDebugEnabled) {
          startCameraDebugHUD();
        } else {
          stopCameraDebugHUD();
        }
        return true;
      },
      setZoneEditorState(state) {
        pendingZoneEditorState = state;
        return zoneEditor.applyState(state);
      },
      setObstacleEditorState(state) {
        pendingObstacleEditorState = state;
        if (!window.guardianViewer) {
          postObstaclePlaceDebug('setObstacleEditorState — guardianViewer missing');
          return false;
        }
        const scene2 = viewerSession?.manager?.scene;
        if (!scene2) {
          postObstaclePlaceDebug('setObstacleEditorState — scene not ready (queued pending)');
          return false;
        }
        postObstaclePlaceDebug('setObstacleEditorState — calling applyState');
        const ok = obstacleEditor.applyState(state);
        const manager = viewerSession?.manager;
        if (manager) obstacleEditor.attach(manager);
        postObstaclePlaceDebug(`setObstacleEditorState — applyState returned ${ok}`);
        return ok;
      },
      routeScenePointer(phase, clientX, clientY) {
        return obstacleEditor.routeScenePointer(phase, clientX, clientY);
      },
      placeObstacleAtScreen(clientX, clientY) {
        return obstacleEditor.placeAtScreen(clientX, clientY);
      },
      prepareObstaclePlacement() {
        const manager = viewerSession?.manager;
        const scene2 = manager?.scene;
        if (!scene2) {
          postObstaclePlaceDebug('prepareObstaclePlacement — scene missing');
          return false;
        }
        if (pendingObstacleEditorState) {
          obstacleEditor.applyState(pendingObstacleEditorState);
        }
        obstacleEditor.attach(manager);
        postObstaclePlaceDebug('prepareObstaclePlacement — attach done');
        return true;
      },
      sceneReady,
    };

    function createZoneEditor(getScene2, notifySwift) {
      const ZONE_COLORS = { start: 0x3b82f6, end: 0x22c55e };
      const ZONE_RADIUS_MIN_M = 20;
      const ZONE_RADIUS_MAX_M = 80;
      const FILL_OPACITY = 0.35;
      const STROKE_OPACITY = 1;
      const STROKE_WIDTH_M = 4;
      const CIRCLE_SEGMENTS = 64;
      const CIRCLE_EDGE_SAMPLES = 16;
      /** Open-field floor collision top (`TrainingEnvironmentWorldSDF` / `open_field_floor`). */
      const MAP_BASE_TOP_ZM = 0;
      const OVERLAY_RENDER_ORDER = 2000;
      const CENTER_MARKER_RADIUS_M = 2;
      let three = null;
      let overlayRoot = null;
      let pointerDom = null;
      let zonePlacementKeyListenerInstalled = false;
      let editorState = {
        placementActive: false,
        tapToEditEnabled: false,
        placementKind: 'start',
        mapHalfExtentM: MAP_GROUND_HALF_EXTENT_M,
        maxZoneRadiusM: ZONE_RADIUS_MAX_M,
        zones: {
          start: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
          end: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
        },
        obstacles: [],
      };
      let visuals = { start: null, end: null };
      /** Wait before placing so shift-pan / drag-rotate can cancel the gesture. */
      const PLACEMENT_WAIT_MS = 300;
      const PLACEMENT_DRAG_PX = 7;
      let placementGesture = null;
      /** Dragging a placed zone (orbit off until release). */
      let zoneDrag = null;
      let zoneDragCapturedPointerId = null;
      let zoneDragWindowEndHandler = null;
      /** Tap on a zone when not in placement mode — opens zone editor in Swift. */
      let zoneTapGesture = null;

      function findFirstMesh(root) {
        let found = null;
        root.traverse((node) => {
          if (!found && node.isMesh && node.name !== 'grid') found = node;
        });
        return found;
      }

      function refreshThreeGeometryConstructors() {
        if (!three) return;
        if (typeof guardianThree?.MeshBasicMaterial === 'function') {
          three.MeshBasicMaterial = guardianThree.MeshBasicMaterial;
        }
        if (typeof guardianThree?.CircleGeometry === 'function') {
          three.CircleGeometry = guardianThree.CircleGeometry;
        }
        if (typeof guardianThree?.RingGeometry === 'function') {
          three.RingGeometry = guardianThree.RingGeometry;
        }
        if (typeof guardianThree?.PlaneGeometry === 'function') {
          three.PlaneGeometry = guardianThree.PlaneGeometry;
        }
      }

      function cacheThree(scene2) {
        if (three) {
          refreshThreeGeometryConstructors();
          return three;
        }
        const grid = scene2.grid;
        const sampleMesh = findFirstMesh(scene2.scene);
        if (!grid || !sampleMesh) return null;
        const Vector3 = scene2.camera.position.constructor;
        const posAttr = sampleMesh.geometry.attributes.position;
        const LineSegmentsCtor = grid.constructor.name === 'GridHelper'
          ? Object.getPrototypeOf(grid.constructor.prototype).constructor
          : grid.constructor;
        const GroupCtor = Object.getPrototypeOf(scene2.scene.constructor.prototype).constructor;
        three = {
          Vector3,
          BufferGeometry: sampleMesh.geometry.constructor,
          Float32BufferAttribute: posAttr.constructor,
          LineBasicMaterial: grid.material.constructor,
          LineSegments: LineSegmentsCtor,
          Group: GroupCtor,
          Mesh: sampleMesh.constructor,
          MeshBasicMaterial: typeof guardianThree?.MeshBasicMaterial === 'function'
            ? guardianThree.MeshBasicMaterial
            : null,
          DoubleSide: guardianThree?.DoubleSide ?? 2,
          CircleGeometry: typeof guardianThree?.CircleGeometry === 'function'
            ? guardianThree.CircleGeometry
            : null,
          RingGeometry: typeof guardianThree?.RingGeometry === 'function'
            ? guardianThree.RingGeometry
            : null,
          PlaneGeometry: typeof guardianThree?.PlaneGeometry === 'function'
            ? guardianThree.PlaneGeometry
            : null,
        };
        return three;
      }

      function liftSurfacePoint(point) {
        if (!point) return point;
        point.z += MAP_SURFACE_LIFT_M;
        return point;
      }

      function mapHalfM() {
        const half = Number(editorState.mapHalfExtentM);
        return Number.isFinite(half) && half > 0 ? half : MAP_GROUND_HALF_EXTENT_M;
      }

      function effectiveMaxZoneRadiusM() {
        const max = Number(editorState.maxZoneRadiusM);
        return Number.isFinite(max) && max > 0 ? max : ZONE_RADIUS_MAX_M;
      }

      function clampRadiusM(radiusM) {
        return Math.max(ZONE_RADIUS_MIN_M, Math.min(effectiveMaxZoneRadiusM(), radiusM));
      }

      function copyZoneRecord(record) {
        return {
          placed: record.placed,
          centerXM: record.centerXM,
          centerYM: record.centerYM,
          centerZM: record.centerZM,
          radiusM: record.radiusM,
          shape: record.shape,
        };
      }

      /** Map-base-square XY bounds from manifest half-extent (`groundHalf` / Swift `floorSize` preset). */
      function resolveMapBaseSquareBounds(_manager, fallbackHalfM) {
        const half = Number.isFinite(fallbackHalfM) && fallbackHalfM > 0
          ? fallbackHalfM
          : MAP_GROUND_HALF_EXTENT_M;
        return { valid: true, minX: -half, maxX: half, minY: -half, maxY: half };
      }

      function mapBaseBounds() {
        return resolveMapBaseSquareBounds(attachedManager, mapHalfM());
      }

      function pointInsideMapBase(x, y, bounds, epsilon = 1e-6) {
        return x >= bounds.minX - epsilon
          && x <= bounds.maxX + epsilon
          && y >= bounds.minY - epsilon
          && y <= bounds.maxY + epsilon;
      }

      /** Zone boundary samples: square corners or circle edge points. */
      function zoneEdgePoints(record) {
        if (!record.placed) return [];
        const cx = record.centerXM;
        const cy = record.centerYM;
        const r = record.radiusM;
        if (record.shape === 'square') {
          return [
            { x: cx - r, y: cy - r },
            { x: cx + r, y: cy - r },
            { x: cx + r, y: cy + r },
            { x: cx - r, y: cy + r },
          ];
        }
        const points = [];
        for (let i = 0; i < CIRCLE_EDGE_SAMPLES; i += 1) {
          const t = (i / CIRCLE_EDGE_SAMPLES) * Math.PI * 2;
          points.push({ x: cx + Math.cos(t) * r, y: cy + Math.sin(t) * r });
        }
        return points;
      }

      function zoneFitsMapBase(record, bounds) {
        if (!record.placed || !bounds?.valid) return true;
        if (!pointInsideMapBase(record.centerXM, record.centerYM, bounds)) return false;
        for (const p of zoneEdgePoints(record)) {
          if (!pointInsideMapBase(p.x, p.y, bounds)) return false;
        }
        return true;
      }

      const ZONE_SEPARATION_EPSILON_M = 1e-6;

      function axisAlignedSquaresOverlap(a, b) {
        const aMinX = a.centerXM - a.radiusM;
        const aMaxX = a.centerXM + a.radiusM;
        const aMinY = a.centerYM - a.radiusM;
        const aMaxY = a.centerYM + a.radiusM;
        const bMinX = b.centerXM - b.radiusM;
        const bMaxX = b.centerXM + b.radiusM;
        const bMinY = b.centerYM - b.radiusM;
        const bMaxY = b.centerYM + b.radiusM;
        if (aMaxX <= bMinX + ZONE_SEPARATION_EPSILON_M) return false;
        if (bMaxX <= aMinX + ZONE_SEPARATION_EPSILON_M) return false;
        if (aMaxY <= bMinY + ZONE_SEPARATION_EPSILON_M) return false;
        if (bMaxY <= aMinY + ZONE_SEPARATION_EPSILON_M) return false;
        return true;
      }

      function circleOverlapsSquare(circle, square) {
        const half = square.radiusM;
        const closestX = Math.min(
          Math.max(circle.centerXM, square.centerXM - half),
          square.centerXM + half
        );
        const closestY = Math.min(
          Math.max(circle.centerYM, square.centerYM - half),
          square.centerYM + half
        );
        const dx = circle.centerXM - closestX;
        const dy = circle.centerYM - closestY;
        const r = circle.radiusM;
        return (dx * dx + dy * dy) < (r * r - ZONE_SEPARATION_EPSILON_M);
      }

      function zonesOverlapPair(a, b) {
        if (!a.placed || !b.placed) return false;
        if (a.shape === 'circle' && b.shape === 'circle') {
          const dx = a.centerXM - b.centerXM;
          const dy = a.centerYM - b.centerYM;
          return Math.hypot(dx, dy) < a.radiusM + b.radiusM - ZONE_SEPARATION_EPSILON_M;
        }
        if (a.shape === 'square' && b.shape === 'square') {
          return axisAlignedSquaresOverlap(a, b);
        }
        if (a.shape === 'circle' && b.shape === 'square') {
          return circleOverlapsSquare(a, b);
        }
        if (a.shape === 'square' && b.shape === 'circle') {
          return circleOverlapsSquare(b, a);
        }
        return false;
      }

      function obstacleFootprintPointsForOverlap(obstacle) {
        const min = 0.01;
        const kind = obstacle.kind;
        const axis = obstacle.axisOrientation === 'horizontal' ? 'horizontal' : 'vertical';
        let dx = 2;
        let dy = 2;
        if (kind === 'cube' && obstacle.cube) {
          dx = dy = Math.max(Number(obstacle.cube.edgeM) || 2, min);
        } else if (kind === 'cuboid' && obstacle.cuboid) {
          dx = Math.max(Number(obstacle.cuboid.lengthM) || 2, min);
          dy = Math.max(Number(obstacle.cuboid.widthM) || 2, min);
        } else if (kind === 'cylinder' && obstacle.cylinder) {
          dx = dy = Math.max(Number(obstacle.cylinder.radiusM) || 1, min) * 2;
          if (axis === 'horizontal') {
            dx = Math.max(Number(obstacle.cylinder.heightM) || 2, min);
            dy = Math.max(Number(obstacle.cylinder.radiusM) || 1, min) * 2;
          }
        } else if (kind === 'cone' && obstacle.cone) {
          dx = dy = Math.max(Number(obstacle.cone.radiusM) || 1, min) * 2;
        } else if (kind === 'pyramid' && obstacle.pyramid) {
          dx = Math.max(Number(obstacle.pyramid.baseWidthM) || 2, min);
          dy = Math.max(Number(obstacle.pyramid.baseDepthM) || 2, min);
        } else if (kind === 'toblerone' && obstacle.toblerone) {
          const w = Math.max(Number(obstacle.toblerone.widthM) || 2, min);
          const l = Math.max(Number(obstacle.toblerone.lengthM) || 2, min);
          const triH = w * Math.sqrt(3) / 2;
          if (axis === 'horizontal') {
            dx = l;
            dy = triH;
          } else {
            dx = w;
            dy = triH;
          }
        }
        const cx = Number(obstacle.centerXM) || 0;
        const cy = Number(obstacle.centerYM) || 0;
        const yaw = (Number(obstacle.yawDeg) || 0) * Math.PI / 180;
        const cos = Math.cos(yaw);
        const sin = Math.sin(yaw);
        const hx = dx / 2;
        const hy = dy / 2;
        const corners = [
          { x: hx, y: hy },
          { x: hx, y: -hy },
          { x: -hx, y: -hy },
          { x: -hx, y: hy },
        ];
        return corners.map((corner) => ({
          x: cx + corner.x * cos - corner.y * sin,
          y: cy + corner.x * sin + corner.y * cos,
        }));
      }

      function convexPolygonsOverlap2D(a, b) {
        if (!a?.length || !b?.length || a.length < 3 || b.length < 3) return false;
        const polygons = [a, b];
        for (const poly of polygons) {
          const count = poly.length;
          for (let index = 0; index < count; index += 1) {
            const p1 = poly[index];
            const p2 = poly[(index + 1) % count];
            const edgeX = p2.x - p1.x;
            const edgeY = p2.y - p1.y;
            let axisX = -edgeY;
            let axisY = edgeX;
            const length = Math.hypot(axisX, axisY);
            if (length <= 1e-12) continue;
            axisX /= length;
            axisY /= length;
            let aMin = Infinity;
            let aMax = -Infinity;
            let bMin = Infinity;
            let bMax = -Infinity;
            for (const p of a) {
              const projection = p.x * axisX + p.y * axisY;
              aMin = Math.min(aMin, projection);
              aMax = Math.max(aMax, projection);
            }
            for (const p of b) {
              const projection = p.x * axisX + p.y * axisY;
              bMin = Math.min(bMin, projection);
              bMax = Math.max(bMax, projection);
            }
            if (aMax <= bMin + ZONE_SEPARATION_EPSILON_M
              || bMax <= aMin + ZONE_SEPARATION_EPSILON_M) {
              return false;
            }
          }
        }
        return true;
      }

      function zoneOverlapsAnyObstacle(zone) {
        if (!zone?.placed) return false;
        const obstacles = editorState.obstacles || [];
        const zonePoly = zoneEdgePoints(zone);
        for (const obstacle of obstacles) {
          if (convexPolygonsOverlap2D(zonePoly, obstacleFootprintPointsForOverlap(obstacle))) {
            return true;
          }
        }
        return false;
      }

      function editorZonesInvalid() {
        const bounds = mapBaseBounds();
        const start = normalizeZoneRecord(zoneRecord('start'));
        const end = normalizeZoneRecord(zoneRecord('end'));
        if (start.placed && !zoneFitsMapBase(start, bounds)) return true;
        if (end.placed && !zoneFitsMapBase(end, bounds)) return true;
        if (zonesOverlapPair(start, end)) return true;
        if (zoneOverlapsAnyObstacle(start)) return true;
        if (zoneOverlapsAnyObstacle(end)) return true;
        return false;
      }

      function maxRadiusOnMapBase(record, bounds) {
        return Math.min(
          record.centerXM - bounds.minX,
          bounds.maxX - record.centerXM,
          record.centerYM - bounds.minY,
          bounds.maxY - record.centerYM,
          effectiveMaxZoneRadiusM()
        );
      }

      /** Fit zone center and edge samples inside the map-base square (translate, then shrink radius). */
      function snapZoneToMapBase(record, bounds) {
        const normalized = normalizeZoneRecord(record);
        if (!normalized.placed || !bounds?.valid) {
          return { record: normalized, failed: false };
        }
        if (zoneFitsMapBase(normalized, bounds)) {
          return { record: normalized, failed: false };
        }

        const samplePoints = (zone) => {
          const pts = [{ x: zone.centerXM, y: zone.centerYM }];
          for (const p of zoneEdgePoints(zone)) pts.push(p);
          return pts;
        };

        let points = samplePoints(normalized);
        let dxMin = -Infinity;
        let dxMax = Infinity;
        let dyMin = -Infinity;
        let dyMax = Infinity;
        for (const p of points) {
          dxMin = Math.max(dxMin, bounds.minX - p.x);
          dxMax = Math.min(dxMax, bounds.maxX - p.x);
          dyMin = Math.max(dyMin, bounds.minY - p.y);
          dyMax = Math.min(dyMax, bounds.maxY - p.y);
        }
        if (dxMin <= dxMax) {
          normalized.centerXM += Math.min(Math.max(0, dxMin), dxMax);
        }
        if (dyMin <= dyMax) {
          normalized.centerYM += Math.min(Math.max(0, dyMin), dyMax);
        }

        if (zoneFitsMapBase(normalized, bounds)) {
          return { record: normalized, failed: false };
        }

        const maxR = maxRadiusOnMapBase(normalized, bounds);
        if (maxR < ZONE_RADIUS_MIN_M) {
          return { record: normalized, failed: true };
        }
        if (normalized.radiusM > maxR) {
          normalized.radiusM = Math.max(ZONE_RADIUS_MIN_M, maxR);
        }
        return { record: normalized, failed: !zoneFitsMapBase(normalized, bounds) };
      }

      function setOrbitEnabled(scene2, enabled) {
        const controls = scene2?.controls;
        if (controls) controls.enabled = enabled;
      }

      function overlayMaterials(T, color) {
        const BasicMaterial = guardianThree?.MeshBasicMaterial ?? T.MeshBasicMaterial;
        if (typeof BasicMaterial !== 'function') return null;
        const side = T.DoubleSide ?? 2;
        const base = {
          color,
          /** Respect sim depth (opaque obstacles occlude zones behind them). */
          depthTest: true,
          fog: false,
          toneMapped: false,
          side,
          /** Slight bias above the floor plane; avoids z-fight with terrain, not “always on top”. */
          polygonOffset: true,
          polygonOffsetFactor: -1,
          polygonOffsetUnits: -1,
        };
        return {
          fill: new BasicMaterial({
            ...base,
            transparent: true,
            opacity: FILL_OPACITY,
            depthWrite: false,
          }),
          stroke: new BasicMaterial({
            ...base,
            transparent: true,
            opacity: STROKE_OPACITY,
            depthWrite: false,
          }),
        };
      }

      function setMeshOverlay(mesh, order) {
        mesh.renderOrder = order;
        mesh.frustumCulled = false;
      }

      function buildIndexedMesh(T, positions, indices, material, order) {
        const geo = new T.BufferGeometry();
        const pos = positions instanceof Float32Array ? positions : new Float32Array(positions);
        geo.setAttribute('position', new T.Float32BufferAttribute(pos, 3));
        if (indices && indices.length > 0) {
          geo.setIndex(indices);
        }
        if (typeof geo.computeBoundingSphere === 'function') {
          geo.computeBoundingSphere();
        }
        const mesh = new T.Mesh(geo, material);
        setMeshOverlay(mesh, order);
        return mesh;
      }

      /** Thick ring stroke on the terrain plane (same quad-strip pattern as squares). */
      function buildFlatDiscRingStroke(T, cx, cy, planeZ, outerR, innerR, segments, materials) {
        const ringVerts = [];
        const ringIdx = [];
        for (let i = 0; i <= segments; i += 1) {
          const t = (i / segments) * Math.PI * 2;
          const cos = Math.cos(t);
          const sin = Math.sin(t);
          ringVerts.push(
            cx + cos * outerR, cy + sin * outerR, planeZ,
            cx + cos * innerR, cy + sin * innerR, planeZ,
          );
        }
        for (let i = 0; i < segments; i += 1) {
          const a = i * 2;
          ringIdx.push(a, a + 2, a + 1, a + 1, a + 2, a + 3);
        }
        return buildIndexedMesh(T, ringVerts, ringIdx, materials.stroke, OVERLAY_RENDER_ORDER + 1);
      }

      function buildCenterMarker(T, cx, cy, planeZ, materials) {
        const m = CENTER_MARKER_RADIUS_M;
        const markerVerts = [
          cx - m, cy - m, planeZ,
          cx + m, cy - m, planeZ,
          cx + m, cy + m, planeZ,
          cx - m, cy + m, planeZ,
        ];
        return buildIndexedMesh(
          T,
          markerVerts,
          [0, 1, 2, 0, 2, 3],
          materials.stroke,
          OVERLAY_RENDER_ORDER + 2
        );
      }

      function buildFlatCircleMeshes(T, cx, cy, planeZ, radius, materials) {
        const innerR = Math.max(radius - STROKE_WIDTH_M, 0.01);
        let fill;
        let stroke;

        if (T.CircleGeometry && T.RingGeometry) {
          const fillGeo = new T.CircleGeometry(radius, CIRCLE_SEGMENTS);
          fill = new T.Mesh(fillGeo, materials.fill);
          fill.position.set(cx, cy, planeZ);
          setMeshOverlay(fill, OVERLAY_RENDER_ORDER);

          const ringGeo = new T.RingGeometry(innerR, radius, CIRCLE_SEGMENTS);
          stroke = new T.Mesh(ringGeo, materials.stroke);
          stroke.position.set(cx, cy, planeZ);
          setMeshOverlay(stroke, OVERLAY_RENDER_ORDER + 1);
        } else {
          const fillVerts = [cx, cy, planeZ];
          for (let i = 0; i <= CIRCLE_SEGMENTS; i += 1) {
            const t = (i / CIRCLE_SEGMENTS) * Math.PI * 2;
            fillVerts.push(
              cx + Math.cos(t) * radius,
              cy + Math.sin(t) * radius,
              planeZ
            );
          }
          const fillIdx = [];
          for (let i = 1; i <= CIRCLE_SEGMENTS; i += 1) {
            fillIdx.push(i, i + 1, 0);
          }
          fill = buildIndexedMesh(T, fillVerts, fillIdx, materials.fill, OVERLAY_RENDER_ORDER);
          stroke = buildFlatDiscRingStroke(
            T, cx, cy, planeZ, radius, innerR, CIRCLE_SEGMENTS, materials
          );
        }

        const marker = buildCenterMarker(T, cx, cy, planeZ, materials);
        return { fill, stroke, marker };
      }

      const SQUARE_FILL_SEGMENTS = 8;

      function buildSubdividedSquareFill(T, cx, cy, planeZ, half, material, order) {
        const segs = SQUARE_FILL_SEGMENTS;
        const verts = [];
        const idx = [];
        for (let j = 0; j <= segs; j += 1) {
          for (let i = 0; i <= segs; i += 1) {
            const u = i / segs;
            const v = j / segs;
            verts.push(
              cx - half + (2 * half * u),
              cy - half + (2 * half * v),
              planeZ
            );
          }
        }
        const stride = segs + 1;
        for (let j = 0; j < segs; j += 1) {
          for (let i = 0; i < segs; i += 1) {
            const a = j * stride + i;
            const b = a + 1;
            const c = a + stride;
            const d = c + 1;
            idx.push(a, b, d, a, d, c);
          }
        }
        return buildIndexedMesh(T, verts, idx, material, order);
      }

      function buildFlatSquareMeshes(T, cx, cy, planeZ, half, materials) {
        const o = half;
        const inner = Math.max(half - STROKE_WIDTH_M, 0.01);
        let fill;
        const PlaneGeometry = T.PlaneGeometry ?? guardianThree?.PlaneGeometry;
        if (typeof PlaneGeometry === 'function') {
          const side = 2 * half;
          const fillGeo = new PlaneGeometry(side, side, SQUARE_FILL_SEGMENTS, SQUARE_FILL_SEGMENTS);
          fill = new T.Mesh(fillGeo, materials.fill);
          fill.position.set(cx, cy, planeZ);
          setMeshOverlay(fill, OVERLAY_RENDER_ORDER);
        } else {
          fill = buildSubdividedSquareFill(
            T, cx, cy, planeZ, half, materials.fill, OVERLAY_RENDER_ORDER
          );
        }

        const ringVerts = [
          cx - o, cy - o, planeZ,
          cx + o, cy - o, planeZ,
          cx + o, cy + o, planeZ,
          cx - o, cy + o, planeZ,
          cx - inner, cy - inner, planeZ,
          cx + inner, cy - inner, planeZ,
          cx + inner, cy + inner, planeZ,
          cx - inner, cy - inner, planeZ,
        ];
        const ringIdx = [
          0, 4, 1, 1, 4, 5,
          1, 5, 2, 2, 5, 6,
          2, 6, 3, 3, 6, 7,
          3, 7, 0, 0, 7, 4,
        ];
        const stroke = buildIndexedMesh(T, ringVerts, ringIdx, materials.stroke, OVERLAY_RENDER_ORDER + 1);
        const marker = buildCenterMarker(T, cx, cy, planeZ, materials);
        return { fill, stroke, marker };
      }

      function createGroup(scene2) {
        const T = cacheThree(scene2);
        if (!T) return null;
        return new T.Group();
      }

      function ensureOverlay(scene2, manager) {
        const existing = scene2.scene.getObjectByName('guardian_zone_overlay');
        if (existing) {
          overlayRoot = existing;
          return overlayRoot;
        }
        const group = createGroup(scene2);
        if (!group) return null;
        overlayRoot = group;
        overlayRoot.name = 'guardian_zone_overlay';
        overlayRoot.renderOrder = OVERLAY_RENDER_ORDER;
        scene2.scene.add(overlayRoot);
        return overlayRoot;
      }

      function collectTerrainMeshes(root, out, skip) {
        root.traverse((node) => {
          if (node === skip || node.parent === skip) return;
          if (node.name === 'guardian_zone_overlay') return;
          if (node.name === 'guardian_map_dimensions') return;
          if (node.name === 'grid') return;
          let ancestor = node;
          while (ancestor) {
            const name = ancestor.name || '';
            if (name === 'guardian_zone_overlay' || name === 'guardian_map_dimensions' || name.startsWith('guardian_zone_')) return;
            ancestor = ancestor.parent;
          }
          if (node.isMesh) out.push(node);
        });
      }

      function sampleTerrain(scene2, x, y) {
        const T = cacheThree(scene2);
        const origin = new T.Vector3(x, y, 8000);
        const dir = new T.Vector3(0, 0, -1);
        scene2.ray.set(origin, dir);
        const meshes = [];
        collectTerrainMeshes(scene2.scene, meshes, overlayRoot);
        const hits = scene2.ray.intersectObjects(meshes, true);
        if (hits.length > 0) {
          let topZ = hits[0].point.z;
          for (let i = 1; i < hits.length; i += 1) {
            topZ = Math.max(topZ, hits[i].point.z);
          }
          return liftSurfacePoint(new T.Vector3(x, y, topZ));
        }
        return liftSurfacePoint(new T.Vector3(x, y, MAP_BASE_TOP_ZM));
      }

      /** Stored centre Z on the map-base top (open_field_floor top is z = 0). */
      function centerZMFromTerrain(scene2, x, y) {
        const lifted = sampleTerrain(scene2, x, y);
        const zm = lifted.z - MAP_SURFACE_LIFT_M;
        return Math.max(MAP_BASE_TOP_ZM, zm);
      }

      function regroundZoneCenterZM(scene2, record) {
        if (!record?.placed || !scene2) return;
        record.centerZM = centerZMFromTerrain(scene2, record.centerXM, record.centerYM);
      }

      /**
       * Pointer → map XY using terrain raycast only (never gzweb getRayCastModel — that
       * hits sibling zone overlays and ratchets centreZM). Z comes from a vertical terrain
       * sample at the resolved XY.
       */
      function pickTerrainPointer(scene2, clientX, clientY) {
        const T = cacheThree(scene2);
        if (!T) return null;
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        const ndc = {
          x: ((clientX - rect.left) / rect.width) * 2 - 1,
          y: -(((clientY - rect.top) / rect.height) * 2 - 1),
        };
        scene2.ray.setFromCamera(ndc, scene2.camera);
        const meshes = [];
        collectTerrainMeshes(scene2.scene, meshes, overlayRoot);
        const hits = scene2.ray.intersectObjects(meshes, true);
        let x;
        let y;
        if (hits.length > 0) {
          let best = hits[0];
          for (let i = 1; i < hits.length; i += 1) {
            if (hits[i].point.z > best.point.z) best = hits[i];
          }
          x = best.point.x;
          y = best.point.y;
        } else {
          const origin = scene2.ray.origin;
          const dir = scene2.ray.direction;
          if (Math.abs(dir.z) < 1e-9) return null;
          const t = -origin.z / dir.z;
          if (t < 0) return null;
          x = origin.x + dir.x * t;
          y = origin.y + dir.y * t;
        }
        const centerZM = centerZMFromTerrain(scene2, x, y);
        return new T.Vector3(x, y, centerZM + MAP_SURFACE_LIFT_M);
      }

      function clearZoneDragPointerWatch(scene2) {
        if (zoneDragWindowEndHandler) {
          window.removeEventListener('pointerup', zoneDragWindowEndHandler, true);
          window.removeEventListener('pointercancel', zoneDragWindowEndHandler, true);
          zoneDragWindowEndHandler = null;
        }
        if (scene2 && zoneDragCapturedPointerId != null) {
          try {
            scene2.getDomElement()?.releasePointerCapture?.(zoneDragCapturedPointerId);
          } catch (_) { /* already released */ }
          zoneDragCapturedPointerId = null;
        }
      }

      function armZoneDragPointerWatch(scene2, pointerId) {
        clearZoneDragPointerWatch(scene2);
        zoneDragCapturedPointerId = pointerId;
        const onGlobalPointerEnd = (event) => {
          if (!zoneDrag) return;
          if (event.pointerId !== zoneDragCapturedPointerId) return;
          const notify = zoneDrag.moved;
          endZoneDrag(scene2, notify);
        };
        zoneDragWindowEndHandler = onGlobalPointerEnd;
        window.addEventListener('pointerup', onGlobalPointerEnd, true);
        window.addEventListener('pointercancel', onGlobalPointerEnd, true);
      }

      function zoneRecord(kind) {
        return editorState.zones[kind];
      }

      function notifyZonesChanged(zoneFailed = false) {
        notifySwift({
          type: 'zonesChanged',
          zones: editorState.zones,
          outOfBounds: Boolean(zoneFailed),
        });
      }

      function clearVisual(kind) {
        const v = visuals[kind];
        if (!v || !overlayRoot) return;
        overlayRoot.remove(v.group);
        visuals[kind] = null;
      }

      function rebuildVisual(scene2, kind) {
        if (!ensureOverlay(scene2, attachedManager)) return;
        const T = cacheThree(scene2);
        if (!T || !overlayRoot) return;
        let record = normalizeZoneRecord(zoneRecord(kind));
        editorState.zones[kind] = record;
        clearVisual(kind);
        if (!record.placed) return;

        const color = ZONE_COLORS[kind];
        const group = createGroup(scene2);
        if (!group) return;
        group.name = `guardian_zone_${kind}`;
        group.renderOrder = OVERLAY_RENDER_ORDER;

        // Radius/shape rebuilds must not resample terrain — that ray can hit this zone's
        // own overlay (or a sibling zone) and ratchet centerZM upward.
        const planeZ = Number(record.centerZM) + MAP_SURFACE_LIFT_M;

        const cx = record.centerXM;
        const cy = record.centerYM;
        const materials = overlayMaterials(T, color);
        if (!materials) return;
        const meshes = record.shape === 'square'
          ? buildFlatSquareMeshes(T, cx, cy, planeZ, record.radiusM, materials)
          : buildFlatCircleMeshes(T, cx, cy, planeZ, record.radiusM, materials);

        group.add(meshes.fill, meshes.stroke, meshes.marker);
        group.userData.guardianZoneKind = kind;
        overlayRoot.add(group);
        visuals[kind] = { group, record };
        if (typeof scene2.render === 'function') {
          scene2.render(0);
        }
      }

      function rebuildAll(scene2, manager) {
        ensureOverlay(scene2, manager);
        rebuildVisual(scene2, 'start');
        rebuildVisual(scene2, 'end');
      }

      function setPlacementControls(scene2, active) {
        const sceneContainer = document.getElementById('scene');
        const canvas = scene2?.getDomElement?.();
        if (sceneContainer) {
          sceneContainer.classList.toggle('placement-mode', active);
        }
        if (canvas) {
          canvas.style.cursor = active ? 'crosshair' : '';
        }
        if (!active) {
          cancelPlacementGesture();
        }
      }

      function cancelPlacementGesture() {
        if (!placementGesture) return;
        if (placementGesture.timerId) {
          clearTimeout(placementGesture.timerId);
        }
        placementGesture = null;
      }

      function tryPlaceFromGesture() {
        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) return;
        if (!editorState.placementActive) {
          cancelPlacementGesture();
          return;
        }
        gesture.placed = true;
        const scene2 = getScene2();
        if (scene2) {
          placeZoneAt(scene2, gesture.clientX, gesture.clientY);
        }
        cancelPlacementGesture();
      }

      function onPlacementWaitElapsed() {
        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) return;
        if (gesture.dragged || gesture.shiftHeld) return;
        tryPlaceFromGesture();
      }

      function cancelPlacementForShiftOrDrag() {
        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) return;
        gesture.cancelled = true;
        if (gesture.timerId) {
          clearTimeout(gesture.timerId);
        }
        placementGesture = null;
      }

      function onPlacementKeyDown(event) {
        if (!placementGesture) return;
        if (event.key === 'Shift' || event.shiftKey) {
          placementGesture.shiftHeld = true;
          cancelPlacementForShiftOrDrag();
        }
      }

      function beginPlacementGesture(clientX, clientY) {
        cancelPlacementGesture();
        placementGesture = {
          clientX,
          clientY,
          cancelled: false,
          placed: false,
          dragged: false,
          shiftHeld: false,
          timerId: setTimeout(onPlacementWaitElapsed, PLACEMENT_WAIT_MS),
        };
      }

      function canvasPos(event, dom) {
        return { x: event.clientX, y: event.clientY };
      }

      function screenDistance(scene2, world, clientX, clientY) {
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        const vector = new (cacheThree(scene2).Vector3)();
        vector.copy(world);
        vector.project(scene2.camera);
        const sx = rect.left + (vector.x * 0.5 + 0.5) * rect.width;
        const sy = rect.top + (-vector.y * 0.5 + 0.5) * rect.height;
        const dx = sx - clientX;
        const dy = sy - clientY;
        return Math.hypot(dx, dy);
      }

      function pointerIsOverCanvas(scene2, clientX, clientY) {
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right
          && clientY >= rect.top && clientY <= rect.bottom;
      }

      function normalizeZoneRecord(raw) {
        const shape = raw?.shape === 'square' ? 'square' : 'circle';
        const radiusM = clampRadiusM(Number(raw?.radiusM) > 0 ? Number(raw.radiusM) : 30);
        return {
          placed: Boolean(raw?.placed),
          centerXM: Number(raw?.centerXM) || 0,
          centerYM: Number(raw?.centerYM) || 0,
          centerZM: Number(raw?.centerZM) || 0,
          radiusM,
          shape,
        };
      }

      function pickZoneKindAt(scene2, clientX, clientY) {
        const hit = pickTerrainPointer(scene2, clientX, clientY);
        if (!hit) return null;
        for (const kind of ['end', 'start']) {
          const record = zoneRecord(kind);
          if (!record.placed) continue;
          const dx = hit.x - record.centerXM;
          const dy = hit.y - record.centerYM;
          if (record.shape === 'square') {
            if (Math.abs(dx) <= record.radiusM && Math.abs(dy) <= record.radiusM) return kind;
          } else if (Math.hypot(dx, dy) <= record.radiusM) {
            return kind;
          }
        }
        return null;
      }

      function moveZoneTo(scene2, kind, clientX, clientY) {
        const hit = pickTerrainPointer(scene2, clientX, clientY);
        if (!hit) return false;
        const record = normalizeZoneRecord(zoneRecord(kind));
        record.placed = true;
        const ox = zoneDrag?.offsetX ?? 0;
        const oy = zoneDrag?.offsetY ?? 0;
        record.centerXM = hit.x - ox;
        record.centerYM = hit.y - oy;
        record.centerZM = centerZMFromTerrain(scene2, record.centerXM, record.centerYM);
        const snapped = snapZoneToMapBase(record, mapBaseBounds());
        editorState.zones[kind] = snapped.record;
        if (zoneDrag) {
          zoneDrag.zoneFailed = snapped.failed || editorZonesInvalid();
        }
        rebuildVisual(scene2, kind);
        return true;
      }

      function placeZoneAt(scene2, clientX, clientY) {
        ensureOverlay(scene2, attachedManager);
        const hit = pickTerrainPointer(scene2, clientX, clientY);
        if (!hit) return false;
        const kind = editorState.placementKind;
        const prev = normalizeZoneRecord(zoneRecord(kind));
        const bounds = mapBaseBounds();
        const centerZM = centerZMFromTerrain(scene2, hit.x, hit.y);
        let record = {
          placed: true,
          centerXM: hit.x,
          centerYM: hit.y,
          centerZM,
          radiusM: prev.radiusM,
          shape: prev.shape,
        };
        const snapped = snapZoneToMapBase(record, bounds);
        editorState.zones[kind] = snapped.record;
        rebuildVisual(scene2, kind);
        const invalid = snapped.failed || editorZonesInvalid();
        notifyZonesChanged(invalid);
        return !invalid;
      }

      function endZoneDrag(scene2, notify) {
        if (!zoneDrag) return;
        const zoneFailed = zoneDrag.zoneFailed;
        const shouldNotify = notify;
        clearZoneDragPointerWatch(scene2);
        zoneDrag = null;
        setOrbitEnabled(scene2, true);
        if (shouldNotify) notifyZonesChanged(zoneFailed);
      }

      function onDomPointerDown(event) {
        const scene2 = getScene2();
        if (!scene2 || !pointerIsOverCanvas(scene2, event.clientX, event.clientY)) return;
        guardianRecordClickHandler('zone-capture-pointerDown');
        if (window.__guardianClickProbeActive) {
          postObstaclePlaceDebug('HANDLER zone capture pointerDown');
        }
        if (event.button !== 0) return;
        if (event.shiftKey) return;

        const dom = scene2.getDomElement();
        const hitKind = pickZoneKindAt(scene2, event.clientX, event.clientY);
        if (hitKind) {
          cancelPlacementGesture();
          if (editorState.placementActive) {
            const grab = pickTerrainPointer(scene2, event.clientX, event.clientY);
            const grabbed = zoneRecord(hitKind);
            zoneDrag = {
              kind: hitKind,
              offsetX: grab ? grab.x - grabbed.centerXM : 0,
              offsetY: grab ? grab.y - grabbed.centerYM : 0,
              moved: false,
              zoneFailed: false,
            };
            setOrbitEnabled(scene2, false);
            dom.setPointerCapture(event.pointerId);
            armZoneDragPointerWatch(scene2, event.pointerId);
            event.preventDefault();
            event.stopImmediatePropagation();
            return;
          }
          if (editorState.tapToEditEnabled) {
            zoneTapGesture = {
              kind: hitKind,
              clientX: event.clientX,
              clientY: event.clientY,
              dragged: false,
            };
          }
          return;
        }

        if (!editorState.placementActive) return;
        beginPlacementGesture(event.clientX, event.clientY);
      }

      function onDomPointerMove(event) {
        const scene2 = getScene2();
        if (zoneTapGesture) {
          const moved = Math.hypot(
            event.clientX - zoneTapGesture.clientX,
            event.clientY - zoneTapGesture.clientY
          );
          if (moved > PLACEMENT_DRAG_PX) {
            zoneTapGesture.dragged = true;
          }
        }
        if (zoneDrag && scene2) {
          if (moveZoneTo(scene2, zoneDrag.kind, event.clientX, event.clientY)) {
            zoneDrag.moved = true;
          }
          event.preventDefault();
          return;
        }

        const gesture = placementGesture;
        if (gesture && !gesture.cancelled && !gesture.placed && !gesture.dragged) {
          const moved = Math.hypot(
            event.clientX - gesture.clientX,
            event.clientY - gesture.clientY
          );
          if (moved > PLACEMENT_DRAG_PX) {
            gesture.dragged = true;
            cancelPlacementForShiftOrDrag();
          }
        }
      }

      function onDomPointerUp(event) {
        if (event.button !== 0) return;
        const scene2 = getScene2();

        if (zoneTapGesture) {
          const tap = zoneTapGesture;
          zoneTapGesture = null;
          if (!tap.dragged) {
            notifySwift({ type: 'zoneEditRequest', kind: tap.kind });
            event.preventDefault();
          }
          return;
        }

        if (zoneDrag) {
          const notify = zoneDrag.moved;
          endZoneDrag(scene2, notify);
          event.preventDefault();
          return;
        }

        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) {
          cancelPlacementGesture();
          return;
        }
        if (gesture.timerId) {
          clearTimeout(gesture.timerId);
          gesture.timerId = null;
        }
        if (!gesture.dragged && !gesture.shiftHeld) {
          tryPlaceFromGesture();
          return;
        }
        cancelPlacementGesture();
      }

      function onContextMenu(event) {
        if (!editorState.placementActive) return;
        const scene2 = getScene2();
        if (!scene2 || !pointerIsOverCanvas(scene2, event.clientX, event.clientY)) return;
        const hitKind = pickZoneKindAt(scene2, event.clientX, event.clientY);
        if (!hitKind) return;
        const record = zoneRecord(hitKind);
        if (!record.placed) return;
        event.preventDefault();
        notifySwift({ type: 'deleteZoneRequest', kind: hitKind });
      }

      function uninstallPointerHandlers() {
        if (!pointerDom) return;
        pointerDom.removeEventListener('pointerdown', onDomPointerDown, true);
        pointerDom.removeEventListener('pointermove', onDomPointerMove, true);
        pointerDom.removeEventListener('pointerup', onDomPointerUp, true);
        pointerDom.removeEventListener('pointercancel', onDomPointerUp, true);
        pointerDom.removeEventListener('contextmenu', onContextMenu, true);
        pointerDom = null;
      }

      function installPointerHandlers(scene2) {
        const dom = scene2?.getDomElement?.();
        if (!dom) return;
        if (pointerDom === dom) return;
        uninstallPointerHandlers();
        dom.addEventListener('pointerdown', onDomPointerDown, true);
        dom.addEventListener('pointermove', onDomPointerMove, true);
        dom.addEventListener('pointerup', onDomPointerUp, true);
        dom.addEventListener('pointercancel', onDomPointerUp, true);
        dom.addEventListener('contextmenu', onContextMenu, true);
        pointerDom = dom;
        if (!zonePlacementKeyListenerInstalled) {
          window.addEventListener('keydown', onPlacementKeyDown, true);
          zonePlacementKeyListenerInstalled = true;
        }
      }

      let attachedManager = null;

      return {
        resetThreeCache() {
          three = null;
        },
        attach(manager) {
          attachedManager = manager;
          const scene2 = manager?.scene;
          if (!scene2) return;
          ensureOverlay(scene2, manager);
          installPointerHandlers(scene2);
        },
        applyState(state) {
          if (!state?.zones) return false;
          const mapHalf = Number(state.mapHalfExtentM) > 0
            ? Number(state.mapHalfExtentM)
            : MAP_GROUND_HALF_EXTENT_M;
          const maxZoneR = Number(state.maxZoneRadiusM) > 0
            ? Number(state.maxZoneRadiusM)
            : ZONE_RADIUS_MAX_M;
          const bounds = resolveMapBaseSquareBounds(attachedManager, mapHalf);
          editorState = {
            placementActive: Boolean(state.placementActive),
            tapToEditEnabled: Boolean(state.tapToEditEnabled),
            placementKind: state.placementKind === 'end' ? 'end' : 'start',
            mapHalfExtentM: mapHalf,
            maxZoneRadiusM: maxZoneR,
            zones: {
              start: normalizeZoneRecord(state.zones.start),
              end: normalizeZoneRecord(state.zones.end),
            },
            obstacles: Array.isArray(state.obstacles) ? state.obstacles : [],
          };
          const scene2 = getScene2();
          for (const kind of ['start', 'end']) {
            const snapped = snapZoneToMapBase(editorState.zones[kind], bounds);
            editorState.zones[kind] = snapped.record;
            regroundZoneCenterZM(scene2, editorState.zones[kind]);
          }
          cancelPlacementGesture();
          clearZoneDragPointerWatch(scene2);
          zoneDrag = null;
          zoneTapGesture = null;
          if (!scene2) return false;
          setPlacementControls(scene2, editorState.placementActive);
          rebuildAll(scene2, attachedManager);
          return true;
        },
      };
    }

    function createObstacleEditor(getScene2, notifySwift) {
      const PLACEMENT_WAIT_MS = 300;
      /** Cancel placement when the pointer moves farther than this (orbit / pan drag). Same as zone editor. */
      const PLACEMENT_DRAG_PX = 7;
      const PLACEMENT_ARM_MS = 350;
      const PICK_RADIUS_PX = 22;

      function logObstaclePlace(step, detail) {
        const line = detail ? `${step} — ${detail}` : step;
        if (!postObstaclePlaceDebug(line)) {
          console.warn('obstacle place (no Swift bridge):', line);
        }
      }

      function setObstaclePlacementModeUI(scene2, active) {
        const sceneContainer = document.getElementById('scene');
        const canvas = scene2?.getDomElement?.();
        if (sceneContainer) {
          sceneContainer.classList.toggle('placement-mode', Boolean(active));
        }
        if (canvas && editorState.placementActive) {
          canvas.style.cursor = 'crosshair';
        } else if (canvas) {
          canvas.style.cursor = '';
        }
      }

      function draftPlacementSummary() {
        const d = editorState.draft || {};
        const kind = d.kind || '?';
        let size = '';
        if (kind === 'cube' && d.cube) size = `edge=${Number(d.cube.edgeM).toFixed(2)}m`;
        else if (kind === 'cuboid' && d.cuboid) {
          size = `${Number(d.cuboid.lengthM).toFixed(1)}×${Number(d.cuboid.widthM).toFixed(1)}×${Number(d.cuboid.heightM).toFixed(1)}m`;
        } else if (kind === 'cylinder' && d.cylinder) {
          size = `r=${Number(d.cylinder.radiusM).toFixed(1)} h=${Number(d.cylinder.heightM).toFixed(1)}m`;
        }
        return `kind=${kind} ${size} autoZ=${Boolean(d.usesAutoZ)} yaw=${Number(d.yawDeg) || 0}°`;
      }

      function editorFlagsSummary() {
        const armedMs = Math.max(0, placementArmedAt - Date.now());
        return [
          `editorActive=${editorState.editorActive}`,
          `placementActive=${editorState.placementActive}`,
          `selected=${editorState.selectedID ?? 'nil'}`,
          `obstacles=${editorState.obstacles.length}`,
          `mapHalf=${editorState.mapHalfExtentM}`,
          `armedInMs=${armedMs}`,
        ].join(' ');
      }
      const GIZMO_RENDER_ORDER = 2100;
      const SELECTED_OUTLINE_COLOR = 0x39ff14;
      /** Back-face shell scales (gzweb bundle has no fat-line API; linewidth is always 1px in WebGL). */
      const SELECTION_OUTLINE_SHELL_SCALES = [1.04, 1.08];
      const SELECTION_OUTLINE_NAME = 'guardian_obstacle_selection_outline';
      const THREE_BACK_SIDE = 1;
      const DELETE_FADE_STEP = 0.05;
      const DELETE_FADE_INTERVAL_MS = 200;
      const DELETE_FADE_MIN = 0.05;
      let editorState = {
        editorActive: false,
        placementActive: false,
        selectedID: null,
        deletingID: null,
        draft: {},
        obstacles: [],
        mapHalfExtentM: MAP_GROUND_HALF_EXTENT_M,
        zones: {
          start: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
          end: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
        },
      };
      let placementGesture = null;
      let placementArmedAt = 0;
      let obstacleDrag = null;
      let obstacleDragFrame = 0;
      let deleteFadeTimer = null;
      let pointerDom = null;
      let placementKeyListenerInstalled = false;
      let obstacleDeleteKeyListenerInstalled = false;
      function recordClickHandler(name) {
        guardianRecordClickHandler(name);
      }

      function instrumentGzwebOrbitCanvas(scene2) {
        const canvas = scene2?.getDomElement?.();
        if (!canvas || canvas.dataset.guardianOrbitTapProbe) return;
        canvas.dataset.guardianOrbitTapProbe = '1';
        for (const type of ['pointerdown', 'mousedown', 'pointerup', 'mouseup']) {
          canvas.addEventListener(type, (event) => {
            if (event.button !== 0) return;
            recordClickHandler(`gzweb-canvas-${type}`);
            if (window.__guardianClickProbeActive) {
              logObstaclePlace(
                'HANDLER gzweb canvas',
                `${type} controls.enabled=${scene2?.controls?.enabled}`
              );
            }
          }, false);
        }
      }

      function isObstacleDeleting(id) {
        return Boolean(id) && editorState.deletingID === id;
      }

      function modelHasDragLock(model) {
        let node = model;
        while (node) {
          if (node.userData?.guardianDragLock) return true;
          node = node.parent;
        }
        return false;
      }

      function installObstaclePoseGuard(scene2) {
        if (!scene2 || scene2._guardianPoseGuardInstalled) return;
        scene2._guardianPoseGuardInstalled = true;
        const nativeSetPose = scene2.setPose.bind(scene2);
        scene2.setPose = function guardedSetPose(model, position, orientation) {
          if (modelHasDragLock(model)) return;
          return nativeSetPose(model, position, orientation);
        };
      }

      function setObstacleDragLock(scene2, id, locked) {
        const root = id ? findObstacleRoot(scene2, id) : null;
        if (!root) return;
        if (!root.userData) root.userData = {};
        if (locked) root.userData.guardianDragLock = true;
        else delete root.userData.guardianDragLock;
      }

      function stopObstacleDragFollowLoop() {
        if (obstacleDragFrame) cancelAnimationFrame(obstacleDragFrame);
        obstacleDragFrame = 0;
      }

      function startObstacleDragFollowLoop(scene2) {
        stopObstacleDragFollowLoop();
        const tick = () => {
          if (!obstacleDrag) return;
          syncObstacleVisualTransforms(scene2, obstacleDrag.id);
          rebuildSelectionOutlines(scene2);
          if (typeof scene2.render === 'function') scene2.render(0);
          obstacleDragFrame = requestAnimationFrame(tick);
        };
        obstacleDragFrame = requestAnimationFrame(tick);
      }

      function removeObstacleGizmo(scene2) {
        const existing = scene2?.scene?.getObjectByName?.('guardian_obstacle_gizmo');
        if (existing?.parent) existing.parent.remove(existing);
      }

      function mapHalfM() {
        const half = Number(editorState.mapHalfExtentM);
        return Number.isFinite(half) && half > 0 ? half : MAP_GROUND_HALF_EXTENT_M;
      }

      /** Map-base square XY bounds (manifest `mapHalfExtentM` / Swift floor half). */
      function mapBaseBounds() {
        const half = mapHalfM();
        return { valid: true, minX: -half, maxX: half, minY: -half, maxY: half };
      }

      function pointInsideMapBase(x, y, bounds, epsilon = 1e-6) {
        return x >= bounds.minX - epsilon
          && x <= bounds.maxX + epsilon
          && y >= bounds.minY - epsilon
          && y <= bounds.maxY + epsilon;
      }

      function notifyChanged(outOfBounds = false) {
        notifySwift({
          type: 'obstaclesChanged',
          obstacles: editorState.obstacles,
          selectedID: editorState.selectedID,
          outOfBounds: Boolean(outOfBounds),
        });
      }

      function verticalExtentsM(obstacle) {
        const min = 0.01;
        const kind = obstacle.kind;
        if (kind === 'cube' && obstacle.cube) {
          const e = Math.max(Number(obstacle.cube.edgeM) || 2, min);
          return { dx: e, dy: e, dz: e };
        }
        if (kind === 'cuboid' && obstacle.cuboid) {
          return {
            dx: Math.max(Number(obstacle.cuboid.lengthM) || 2, min),
            dy: Math.max(Number(obstacle.cuboid.widthM) || 2, min),
            dz: Math.max(Number(obstacle.cuboid.heightM) || 2, min),
          };
        }
        if (kind === 'cylinder' && obstacle.cylinder) {
          const r = Math.max(Number(obstacle.cylinder.radiusM) || 1, min);
          const h = Math.max(Number(obstacle.cylinder.heightM) || 2, min);
          return { dx: r * 2, dy: r * 2, dz: h };
        }
        if (kind === 'cone' && obstacle.cone) {
          const r = Math.max(Number(obstacle.cone.radiusM) || 1, min);
          const h = Math.max(Number(obstacle.cone.heightM) || 2, min);
          return { dx: r * 2, dy: r * 2, dz: h };
        }
        if (kind === 'pyramid' && obstacle.pyramid) {
          return {
            dx: Math.max(Number(obstacle.pyramid.baseWidthM) || 2, min),
            dy: Math.max(Number(obstacle.pyramid.baseDepthM) || 2, min),
            dz: Math.max(Number(obstacle.pyramid.heightM) || 2, min),
          };
        }
        if (kind === 'toblerone' && obstacle.toblerone) {
          const w = Math.max(Number(obstacle.toblerone.widthM) || 2, min);
          const l = Math.max(Number(obstacle.toblerone.lengthM) || 2, min);
          const triH = w * Math.sqrt(3) / 2;
          return { dx: w, dy: triH, dz: l };
        }
        return { dx: 2, dy: 2, dz: 2 };
      }

      function orientedExtentsM(obstacle) {
        let ext = verticalExtentsM(obstacle);
        const axis = obstacle.axisOrientation === 'horizontal' ? 'horizontal' : 'vertical';
        if (axis === 'horizontal' && (obstacle.kind === 'cylinder' || obstacle.kind === 'toblerone')) {
          return { dx: ext.dz, dy: ext.dy, dz: ext.dx };
        }
        return ext;
      }

      function footprintHalfM(obstacle) {
        const kind = obstacle.kind;
        const axis = obstacle.axisOrientation === 'horizontal' ? 'horizontal' : 'vertical';
        let dx = 2;
