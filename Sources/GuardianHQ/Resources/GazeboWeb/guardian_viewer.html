        let dy = 2;
        if (kind === 'cube' && obstacle.cube) {
          dx = dy = obstacle.cube.edgeM;
        } else if (kind === 'cuboid' && obstacle.cuboid) {
          dx = obstacle.cuboid.lengthM;
          dy = obstacle.cuboid.widthM;
        } else if (kind === 'cylinder' && obstacle.cylinder) {
          dx = dy = obstacle.cylinder.radiusM * 2;
          if (axis === 'horizontal') {
            dx = obstacle.cylinder.heightM;
            dy = obstacle.cylinder.radiusM * 2;
          }
        } else if (kind === 'cone' && obstacle.cone) {
          dx = dy = obstacle.cone.radiusM * 2;
        } else if (kind === 'pyramid' && obstacle.pyramid) {
          dx = obstacle.pyramid.baseWidthM;
          dy = obstacle.pyramid.baseDepthM;
        } else if (kind === 'toblerone' && obstacle.toblerone) {
          const w = obstacle.toblerone.widthM;
          const triH = w * Math.sqrt(3) / 2;
          dx = w;
          dy = axis === 'horizontal' ? obstacle.toblerone.lengthM : triH;
          if (axis === 'horizontal') dy = triH;
        }
        const yaw = (Number(obstacle.yawDeg) || 0) * Math.PI / 180;
        const c = Math.abs(Math.cos(yaw));
        const s = Math.abs(Math.sin(yaw));
        return {
          hx: (dx / 2) * c + (dy / 2) * s,
          hy: (dx / 2) * s + (dy / 2) * c,
        };
      }

      function obstacleFootprintPoints(obstacle) {
        const { hx, hy } = footprintHalfM(obstacle);
        const cx = obstacle.centerXM;
        const cy = obstacle.centerYM;
        const yaw = (Number(obstacle.yawDeg) || 0) * Math.PI / 180;
        const cos = Math.cos(yaw);
        const sin = Math.sin(yaw);
        const corners = [
          { x: hx, y: hy },
          { x: hx, y: -hy },
          { x: -hx, y: -hy },
          { x: -hx, y: hy },
        ];
        return corners.map((corner) => ({
          x: cx + corner.x * cos - corner.y * sin,
          y: cy + corner.x * sin + corner.y * cos,
        }));
      }

      function obstacleFitsMapBase(obstacle, bounds) {
        if (!bounds?.valid) return true;
        if (!pointInsideMapBase(obstacle.centerXM, obstacle.centerYM, bounds)) return false;
        for (const p of obstacleFootprintPoints(obstacle)) {
          if (!pointInsideMapBase(p.x, p.y, bounds)) return false;
        }
        return true;
      }

      const OBSTACLE_ZONE_CIRCLE_EDGE_SAMPLES = 16;
      const OBSTACLE_SEPARATION_EPSILON_M = 1e-6;

      function zoneEdgePointsForBounds(zone) {
        if (!zone?.placed) return [];
        const cx = zone.centerXM;
        const cy = zone.centerYM;
        const r = zone.radiusM;
        if (zone.shape === 'square') {
          return [
            { x: cx - r, y: cy - r },
            { x: cx + r, y: cy - r },
            { x: cx + r, y: cy + r },
            { x: cx - r, y: cy + r },
          ];
        }
        const points = [];
        for (let i = 0; i < OBSTACLE_ZONE_CIRCLE_EDGE_SAMPLES; i += 1) {
          const t = (i / OBSTACLE_ZONE_CIRCLE_EDGE_SAMPLES) * Math.PI * 2;
          points.push({ x: cx + Math.cos(t) * r, y: cy + Math.sin(t) * r });
        }
        return points;
      }

      function projectPolygon(poly, axisX, axisY) {
        let minP = Infinity;
        let maxP = -Infinity;
        for (const p of poly) {
          const projection = p.x * axisX + p.y * axisY;
          minP = Math.min(minP, projection);
          maxP = Math.max(maxP, projection);
        }
        return { min: minP, max: maxP };
      }

      function convexPolygonsOverlap(a, b) {
        if (!a?.length || !b?.length || a.length < 3 || b.length < 3) return false;
        const polygons = [a, b];
        for (const poly of polygons) {
          const count = poly.length;
          for (let index = 0; index < count; index += 1) {
            const p1 = poly[index];
            const p2 = poly[(index + 1) % count];
            const edgeX = p2.x - p1.x;
            const edgeY = p2.y - p1.y;
            let axisX = -edgeY;
            let axisY = edgeX;
            const length = Math.hypot(axisX, axisY);
            if (length <= 1e-12) continue;
            axisX /= length;
            axisY /= length;
            const aRange = projectPolygon(a, axisX, axisY);
            const bRange = projectPolygon(b, axisX, axisY);
            if (aRange.max <= bRange.min + OBSTACLE_SEPARATION_EPSILON_M
              || bRange.max <= aRange.min + OBSTACLE_SEPARATION_EPSILON_M) {
              return false;
            }
          }
        }
        return true;
      }

      function obstacleOverlapsPlacedZone(obstacle, zone) {
        if (!zone?.placed) return false;
        return convexPolygonsOverlap(obstacleFootprintPoints(obstacle), zoneEdgePointsForBounds(zone));
      }

      function obstacleFitsPlacement(obstacle, bounds) {
        if (!obstacleFitsMapBase(obstacle, bounds)) return false;
        const zones = editorState.zones || {};
        if (obstacleOverlapsPlacedZone(obstacle, zones.start)) return false;
        if (obstacleOverlapsPlacedZone(obstacle, zones.end)) return false;
        return true;
      }

      /** Zone-style snap: translate footprint inside map-base; failed only when it cannot fit. */
      function snapObstacleToMapBase(obstacle, bounds) {
        if (!bounds?.valid) return { obstacle, failed: false };
        if (obstacleFitsPlacement(obstacle, bounds)) {
          return { obstacle, failed: false };
        }
        let points = [{ x: obstacle.centerXM, y: obstacle.centerYM }];
        for (const p of obstacleFootprintPoints(obstacle)) points.push(p);
        let dxMin = -Infinity;
        let dxMax = Infinity;
        let dyMin = -Infinity;
        let dyMax = Infinity;
        for (const p of points) {
          dxMin = Math.max(dxMin, bounds.minX - p.x);
          dxMax = Math.min(dxMax, bounds.maxX - p.x);
          dyMin = Math.max(dyMin, bounds.minY - p.y);
          dyMax = Math.min(dyMax, bounds.maxY - p.y);
        }
        if (dxMin <= dxMax) {
          obstacle.centerXM += Math.min(Math.max(0, dxMin), dxMax);
        }
        if (dyMin <= dyMax) {
          obstacle.centerYM += Math.min(Math.max(0, dyMin), dyMax);
        }
        return { obstacle, failed: !obstacleFitsPlacement(obstacle, bounds) };
      }

      function setOrbitEnabled(scene2, enabled) {
        const controls = scene2?.controls;
        if (controls) controls.enabled = enabled;
      }

      /** Exclude editor overlays; match zone editor terrain pick (highest Z + z=0 fallback). */
      function collectObstacleTerrainMeshes(root, out) {
        root.traverse((node) => {
          if (node.name === 'guardian_obstacle_gizmo' || node.name === 'guardian_zone_overlay'
            || node.name === 'guardian_map_dimensions' || node.name === 'grid') {
            return;
          }
          let ancestor = node;
          while (ancestor) {
            const name = ancestor.name || '';
            if (name === 'guardian_zone_overlay' || name === 'guardian_map_dimensions'
              || name.startsWith('guardian_zone_') || name.startsWith('guardian_obstacle_')) {
              return;
            }
            ancestor = ancestor.parent;
          }
          if (node.isMesh) out.push(node);
        });
      }

      /**
       * Map click → floor XY (never `.clone()` on hit points — gzweb may return plain objects).
       * Same strategy as zone ``pickTerrainPointer``: terrain meshes, highest Z, else z=0 plane.
       */
      function pickTerrainSurface(scene2, clientX, clientY) {
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        const ndc = {
          x: ((clientX - rect.left) / rect.width) * 2 - 1,
          y: -(((clientY - rect.top) / rect.height) * 2 - 1),
        };
        scene2.ray.setFromCamera(ndc, scene2.camera);
        const meshes = [];
        collectObstacleTerrainMeshes(scene2.scene, meshes);
        const hits = scene2.ray.intersectObjects(meshes, true);
        if (hits.length > 0) {
          let best = hits[0];
          for (let i = 1; i < hits.length; i += 1) {
            if (hits[i].point.z > best.point.z) best = hits[i];
          }
          const p = best.point;
          return { x: p.x, y: p.y, z: p.z };
        }
        const origin = scene2.ray.origin;
        const dir = scene2.ray.direction;
        if (Math.abs(dir.z) < 1e-9) return null;
        const t = -origin.z / dir.z;
        if (t < 0) return null;
        return {
          x: origin.x + dir.x * t,
          y: origin.y + dir.y * t,
          z: 0,
        };
      }

      function pickSurface(scene2, clientX, clientY) {
        return pickTerrainSurface(scene2, clientX, clientY);
      }

      /** Placement click must hit the floor and fit the prototype footprint on the map-base square. */
      function placementHitOnMapBase(scene2, clientX, clientY, logFailures) {
        const hit = pickSurface(scene2, clientX, clientY);
        if (!hit) {
          if (logFailures) logObstaclePlace('placementHit', 'no raycast surface hit');
          return null;
        }
        const bounds = mapBaseBounds();
        if (!bounds?.valid) {
          if (logFailures) {
            logObstaclePlace(
              'placementHit',
              `surface ok (${hit.x.toFixed(2)}, ${hit.y.toFixed(2)}) z=${hit.z.toFixed(2)} — bounds invalid, using hit`
            );
          }
          return hit;
        }
        const candidate = {
          ...editorState.draft,
          centerXM: hit.x,
          centerYM: hit.y,
        };
        if (!obstacleFitsMapBase(candidate, bounds)) {
          if (logFailures) {
            const { hx, hy } = footprintHalfM(candidate);
            logObstaclePlace(
              'placementHit',
              `footprint outside map at (${hit.x.toFixed(2)}, ${hit.y.toFixed(2)}) hx=${hx.toFixed(2)} hy=${hy.toFixed(2)} ${draftPlacementSummary()}`
            );
          }
          return null;
        }
        if (logFailures) {
          logObstaclePlace(
            'placementHit',
            `ok (${hit.x.toFixed(2)}, ${hit.y.toFixed(2)}) z=${hit.z.toFixed(2)} ${draftPlacementSummary()}`
          );
        }
        return hit;
      }

      function projectToClient(scene2, x, y, z) {
        const p = new scene2.camera.position.constructor(x, y, z);
        p.project(scene2.camera);
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        return {
          x: rect.left + ((p.x + 1) / 2) * rect.width,
          y: rect.top + ((-p.y + 1) / 2) * rect.height,
        };
      }

      function obstacleIdFromObject(object) {
        let node = object;
        while (node) {
          const name = node.name || '';
          if (name.startsWith('guardian_obstacle_')) {
            const suffix = name.slice('guardian_obstacle_'.length);
            const match = editorState.obstacles.find((o) => {
              const safe = o.id.toLowerCase().replace(/-/g, '_').replace(/[^a-z0-9_]/g, '');
              return safe === suffix;
            });
            if (match && !isObstacleDeleting(match.id)) return match.id;
          }
          node = node.parent;
        }
        return null;
      }

      function pickObstacleIdFromRay(scene2, clientX, clientY) {
        const dom = scene2.getDomElement();
        const rect = dom.getBoundingClientRect();
        const ndc = {
          x: ((clientX - rect.left) / rect.width) * 2 - 1,
          y: -(((clientY - rect.top) / rect.height) * 2 - 1),
        };
        scene2.ray.setFromCamera(ndc, scene2.camera);
        const meshes = [];
        scene2.scene.traverse((node) => {
          if (!node.isMesh) return;
          if (node.name === 'guardian_obstacle_gizmo' || node.name === 'guardian_zone_overlay' || node.name === 'guardian_map_dimensions' || node.name === 'grid') return;
          let ancestor = node;
          while (ancestor) {
            const name = ancestor.name || '';
            if (name.startsWith('guardian_obstacle_')) {
              meshes.push(node);
              return;
            }
            ancestor = ancestor.parent;
          }
        });
        const hits = meshes.length > 0 ? scene2.ray.intersectObjects(meshes, true) : [];
        for (const hit of hits) {
          const id = obstacleIdFromObject(hit.object);
          if (id) return id;
        }
        return null;
      }

      function pickObstacleId(scene2, clientX, clientY) {
        const rayHit = pickObstacleIdFromRay(scene2, clientX, clientY);
        if (rayHit) return rayHit;
        let best = null;
        let bestD = PICK_RADIUS_PX;
        for (const obstacle of editorState.obstacles) {
          if (isObstacleDeleting(obstacle.id)) continue;
          const projected = projectToClient(
            scene2,
            obstacle.centerXM,
            obstacle.centerYM,
            obstacle.centerZM
          );
          const d = Math.hypot(projected.x - clientX, projected.y - clientY);
          if (d < bestD) {
            bestD = d;
            best = obstacle.id;
          }
        }
        return best;
      }

      function findObstacle(id) {
        return editorState.obstacles.find((o) => o.id === id) ?? null;
      }

      function obstacleSafeName(id) {
        return id.toLowerCase().replace(/-/g, '_').replace(/[^a-z0-9_]/g, '');
      }

      function findObstacleRoot(scene2, id) {
        if (!scene2 || !id) return null;
        return scene2.scene.getObjectByName(`guardian_obstacle_${obstacleSafeName(id)}`);
      }

      function forEachObstacleMaterial(root, fn) {
        if (!root) return;
        root.traverse((child) => {
          if (!child.isMesh || !child.material) return;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(fn);
        });
      }

      function captureOpacityBackup(root) {
        if (!root || root.userData?.guardianOpacityBackup) return;
        const backup = [];
        forEachObstacleMaterial(root, (material) => {
          backup.push({
            material,
            opacity: material.opacity,
            transparent: material.transparent,
          });
        });
        if (!root.userData) root.userData = {};
        root.userData.guardianOpacityBackup = backup;
      }

      function setObstacleRootOpacity(root, opacity) {
        forEachObstacleMaterial(root, (material) => {
          material.transparent = opacity < 1;
          material.opacity = opacity;
          material.needsUpdate = true;
        });
      }

      function restoreObstacleOpacity(root) {
        if (!root) return;
        const backup = root.userData?.guardianOpacityBackup;
        if (!backup) return;
        for (const entry of backup) {
          entry.material.opacity = entry.opacity;
          entry.material.transparent = entry.transparent;
          entry.material.needsUpdate = true;
        }
        delete root.userData.guardianOpacityBackup;
      }

      function stopDeleteFade(scene2, { restore = false, id = null } = {}) {
        if (deleteFadeTimer) {
          clearInterval(deleteFadeTimer);
          deleteFadeTimer = null;
        }
        const fadeID = id ?? editorState.deletingID;
        if (restore && fadeID && scene2) {
          const root = findObstacleRoot(scene2, fadeID);
          if (root) restoreObstacleOpacity(root);
          if (typeof scene2.render === 'function') scene2.render(0);
        }
      }

      function startDeleteFade(scene2, id) {
        stopDeleteFade(scene2, { restore: false });
        if (!scene2 || !id) return;
        const root = findObstacleRoot(scene2, id);
        if (!root) return;
        captureOpacityBackup(root);
        let current = 1;
        setObstacleRootOpacity(root, current);
        if (typeof scene2.render === 'function') scene2.render(0);
        deleteFadeTimer = setInterval(() => {
          if (editorState.deletingID !== id) {
            stopDeleteFade(scene2, { restore: true, id });
            return;
          }
          const liveRoot = findObstacleRoot(scene2, id);
          if (!liveRoot) {
            stopDeleteFade(scene2, { restore: false, id });
            return;
          }
          current = Math.max(DELETE_FADE_MIN, current - DELETE_FADE_STEP);
          setObstacleRootOpacity(liveRoot, current);
          if (typeof scene2.render === 'function') scene2.render(0);
        }, DELETE_FADE_INTERVAL_MS);
      }

      /** Clears legacy viewer scale caches (removed Box3 rescaling — sizes come from Gazebo SDF). */
      function resetObstacleRootViewerScale(root) {
        if (!root) return;
        root.scale.set(1, 1, 1);
        if (root.userData) {
          delete root.userData.guardianMeshBaseExtents;
          delete root.userData.guardianAppliedExtents;
        }
      }

      /** Live toolbar feedback: move / rotate gzweb models to match manifest obstacles (metres from sim). */
      function syncObstacleVisualTransforms(scene2, onlyID = null) {
        if (!scene2?.scene) return;
        for (const obstacle of editorState.obstacles) {
          if (onlyID && obstacle.id !== onlyID) continue;
          const root = findObstacleRoot(scene2, obstacle.id);
          if (!root) continue;
          const cx = Number(obstacle.centerXM) || 0;
          const cy = Number(obstacle.centerYM) || 0;
          const cz = Number(obstacle.centerZM) || 0;
          const yawRad = (Number(obstacle.yawDeg) || 0) * Math.PI / 180;
          resetObstacleRootViewerScale(root);
          root.position.set(cx, cy, cz);
          root.rotation.set(0, 0, yawRad, 'ZYX');
        }
        if (typeof scene2.render === 'function') {
          scene2.render(0);
        }
      }

      /** Drops gzweb scene nodes for obstacles not in the manifest (phantoms / duplicates). */
      function purgeOrphanObstacleMeshes(scene2) {
        if (!scene2?.scene) return;
        const allowed = new Set(
          editorState.obstacles.map((o) => `guardian_obstacle_${obstacleSafeName(o.id)}`)
        );
        const seenAllowed = new Set();
        const toRemove = [];
        scene2.scene.traverse((node) => {
          const name = node.name || '';
          if (!name.startsWith('guardian_obstacle_')) return;
          if (name === 'guardian_obstacle_gizmo') return;
          const parentName = node.parent?.name || '';
          if (parentName.startsWith('guardian_obstacle_')) return;
          if (allowed.has(name)) {
            if (seenAllowed.has(name)) toRemove.push(node);
            else seenAllowed.add(name);
            return;
          }
          toRemove.push(node);
        });
        for (const node of toRemove) {
          removeSelectionOutlinesFromNode(node);
          node.parent?.remove(node);
        }
        if (toRemove.length > 0 && typeof scene2.render === 'function') {
          scene2.render(0);
        }
      }

      function removeSelectionOutlinesFromNode(node) {
        const toRemove = [];
        node.traverse((child) => {
          if (child.name === SELECTION_OUTLINE_NAME) toRemove.push(child);
        });
        for (const outline of toRemove) {
          if (Array.isArray(outline.material)) {
            outline.material.forEach((m) => m?.dispose?.());
          } else {
            outline.material?.dispose?.();
          }
          outline.parent?.remove(outline);
        }
      }

      function clearAllSelectionOutlines(scene2) {
        if (!scene2) return;
        for (const obstacle of editorState.obstacles) {
          const root = findObstacleRoot(scene2, obstacle.id);
          if (root) removeSelectionOutlinesFromNode(root);
        }
      }

      /**
       * Thick green selection rim without WebGL linewidth (unsupported in gzweb's Three build).
       * Renders slightly enlarged back-face shells of each mesh — reads as ~3px halo on cubes/primitives.
       */
      function addSelectionOutlineShells(mesh) {
        const MeshBasicMaterial = guardianThree?.MeshBasicMaterial;
        if (!MeshBasicMaterial || !mesh?.isMesh || !mesh.geometry) return;
        const MeshCtor = mesh.constructor;
        SELECTION_OUTLINE_SHELL_SCALES.forEach((scale, index) => {
          const shell = new MeshCtor(mesh.geometry, new MeshBasicMaterial({
            color: SELECTED_OUTLINE_COLOR,
            side: THREE_BACK_SIDE,
            depthTest: true,
            depthWrite: false,
            fog: false,
            toneMapped: false,
            transparent: index > 0,
            opacity: index === 0 ? 1 : 0.55,
          }));
          shell.name = SELECTION_OUTLINE_NAME;
          shell.renderOrder = GIZMO_RENDER_ORDER + index;
          shell.scale.set(scale, scale, scale);
          mesh.add(shell);
        });
      }

      function rebuildSelectionOutlines(scene2) {
        if (!scene2) return;
        clearAllSelectionOutlines(scene2);
        const id = editorState.selectedID;
        if (!id || !editorState.editorActive || isObstacleDeleting(id)) return;
        const root = findObstacleRoot(scene2, id);
        if (!root) return;
        root.traverse((child) => {
          if (!child.isMesh || !child.geometry) return;
          if (child.name === SELECTION_OUTLINE_NAME) return;
          addSelectionOutlineShells(child);
        });
        if (typeof scene2.render === 'function') {
          scene2.render(0);
        }
      }

      function onObstacleDeleteKeyDown(event) {
        if (!editorState.editorActive) return;
        if (event.key !== 'Delete' && event.key !== 'Backspace') return;
        const tag = event.target?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || event.target?.isContentEditable) return;
        const id = editorState.selectedID;
        if (!id || isObstacleDeleting(id)) return;
        event.preventDefault();
        notifySwift({ type: 'deleteObstacleRequest', obstacleID: id });
      }

      function installObstacleDeleteKeyListener() {
        if (obstacleDeleteKeyListenerInstalled) return;
        window.addEventListener('keydown', onObstacleDeleteKeyDown, true);
        obstacleDeleteKeyListenerInstalled = true;
      }

      function setSelectedObstacle(scene2, id, notify = true) {
        if (id && isObstacleDeleting(id)) return;
        editorState.selectedID = id;
        if (scene2) rebuildSelectionOutlines(scene2);
        if (notify) notifyChanged(false);
      }

      function placeNewAt(scene2, clientX, clientY) {
        logObstaclePlace('placeNewAt', `client=(${clientX.toFixed(0)},${clientY.toFixed(0)}) ${editorFlagsSummary()}`);
        try {
          const hit = placementHitOnMapBase(scene2, clientX, clientY, true);
          if (!hit) {
            logObstaclePlace('placeNewAt', 'aborted — placementHit failed');
            return;
          }
          logObstaclePlace('placeNewAt', `notifySwift placeObstacle (${hit.x.toFixed(2)}, ${hit.y.toFixed(2)})`);
          notifySwift({ type: 'placeObstacle', centerXM: hit.x, centerYM: hit.y });
        } catch (err) {
          logObstaclePlace('placeNewAt', `error — ${err?.message || String(err)}`);
        }
      }

      function moveSelected(scene2, clientX, clientY) {
        const dragID = obstacleDrag?.id ?? editorState.selectedID;
        const selected = dragID ? findObstacle(dragID) : null;
        if (!selected) return false;
        const hit = pickSurface(scene2, clientX, clientY);
        if (!hit) return false;
        selected.centerXM = hit.x - (obstacleDrag?.offsetX ?? 0);
        selected.centerYM = hit.y - (obstacleDrag?.offsetY ?? 0);
        const snapped = snapObstacleToMapBase(selected, mapBaseBounds());
        if (obstacleDrag) {
          obstacleDrag.outOfBounds = snapped.failed;
        }
        syncObstacleVisualTransforms(scene2, dragID);
        rebuildSelectionOutlines(scene2);
        return snapped.failed;
      }

      function obstacleCenterMovedSinceDragStart(drag) {
        const obstacle = findObstacle(drag.id);
        if (!obstacle || !drag.startCenter) return false;
        const eps = 1e-4;
        return (
          Math.abs((Number(obstacle.centerXM) || 0) - drag.startCenter.x) > eps
          || Math.abs((Number(obstacle.centerYM) || 0) - drag.startCenter.y) > eps
        );
      }

      function endObstacleDrag(scene2, event, moved) {
        if (!obstacleDrag) return;
        const oob = obstacleDrag.outOfBounds;
        const id = obstacleDrag.id;
        const positionChanged = moved || obstacleCenterMovedSinceDragStart(obstacleDrag);
        stopObstacleDragFollowLoop();
        obstacleDrag = null;
        setOrbitEnabled(scene2, true);
        if (positionChanged) {
          notifyChanged(oob);
        } else {
          setSelectedObstacle(scene2, id, true);
        }
        try { scene2?.getDomElement?.()?.releasePointerCapture?.(event.pointerId); } catch (_) {}
        // Keep pose override briefly so Gazebo dynamic_pose does not snap the model back before the sim updates.
        let holdFrames = 60;
        const holdTick = () => {
          if (!scene2) {
            setObstacleDragLock(scene2, id, false);
            return;
          }
          syncObstacleVisualTransforms(scene2, id);
          rebuildSelectionOutlines(scene2);
          if (typeof scene2.render === 'function') scene2.render(0);
          if (holdFrames > 0) {
            holdFrames -= 1;
            requestAnimationFrame(holdTick);
          } else {
            setObstacleDragLock(scene2, id, false);
          }
        };
        requestAnimationFrame(holdTick);
      }

      function cancelPlacementGesture() {
        if (!placementGesture) return;
        if (placementGesture.timerId) clearTimeout(placementGesture.timerId);
        placementGesture = null;
      }

      function tryPlaceFromGesture(source) {
        const gesture = placementGesture;
        if (!gesture) {
          logObstaclePlace('tryPlace', `${source} — no gesture`);
          return;
        }
        if (gesture.cancelled) {
          logObstaclePlace('tryPlace', `${source} — gesture cancelled`);
          return;
        }
        if (gesture.placed) {
          logObstaclePlace('tryPlace', `${source} — already placed`);
          return;
        }
        if (gesture.shiftHeld) {
          logObstaclePlace('tryPlace', `${source} — shift held`);
          return;
        }
        if (gesture.dragged) {
          logObstaclePlace('tryPlace', `${source} — dragged`);
          return;
        }
        const now = Date.now();
        if (now < placementArmedAt) {
          logObstaclePlace('tryPlace', `${source} — not armed (${placementArmedAt - now}ms left)`);
          return;
        }
        const scene2 = getScene2();
        if (!scene2) {
          logObstaclePlace('tryPlace', `${source} — scene2 missing`);
          return;
        }
        if (!editorState.placementActive) {
          logObstaclePlace('tryPlace', `${source} — placementActive=false ${editorFlagsSummary()}`);
          return;
        }
        logObstaclePlace('tryPlace', `${source} — invoking placeNewAt ${draftPlacementSummary()}`);
        placeNewAt(scene2, gesture.clientX, gesture.clientY);
        gesture.placed = true;
        cancelPlacementGesture();
      }

      function onPlacementWaitElapsed() {
        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) return;
        if (gesture.dragged || gesture.shiftHeld) return;
        logObstaclePlace('timer', `wait ${PLACEMENT_WAIT_MS}ms elapsed`);
        tryPlaceFromGesture('timer');
      }

      function cancelPlacementForShiftOrDrag(reason) {
        const gesture = placementGesture;
        if (!gesture || gesture.cancelled || gesture.placed) return;
        gesture.cancelled = true;
        if (gesture.timerId) clearTimeout(gesture.timerId);
        placementGesture = null;
        logObstaclePlace('gesture cancel', reason);
      }

      function onPlacementKeyDown(event) {
        if (!placementGesture) return;
        if (event.key === 'Shift' || event.shiftKey) {
          placementGesture.shiftHeld = true;
          cancelPlacementForShiftOrDrag('shift key');
        }
      }

      function beginPlacementGesture(clientX, clientY) {
        cancelPlacementGesture();
        placementGesture = {
          clientX,
          clientY,
          cancelled: false,
          placed: false,
          dragged: false,
          shiftHeld: false,
          timerId: setTimeout(onPlacementWaitElapsed, PLACEMENT_WAIT_MS),
        };
        logObstaclePlace(
          'pointerDown',
          `begin placement gesture (${clientX.toFixed(0)},${clientY.toFixed(0)}) wait=${PLACEMENT_WAIT_MS}ms ${editorFlagsSummary()} ${draftPlacementSummary()}`
        );
      }

      function beginObstacleDrag(scene2, dom, event, id) {
        const selected = findObstacle(id);
        if (!selected) return;
        const hit = pickSurface(scene2, event.clientX, event.clientY);
        obstacleDrag = {
          id,
          offsetX: hit ? hit.x - selected.centerXM : 0,
          offsetY: hit ? hit.y - selected.centerYM : 0,
          moved: false,
          outOfBounds: false,
          startCenter: {
            x: Number(selected.centerXM) || 0,
            y: Number(selected.centerYM) || 0,
          },
        };
        setSelectedObstacle(scene2, id, true);
        setObstacleDragLock(scene2, id, true);
        setOrbitEnabled(scene2, false);
        syncObstacleVisualTransforms(scene2, id);
        startObstacleDragFollowLoop(scene2);
        dom.setPointerCapture(event.pointerId);
        event.preventDefault();
        event.stopImmediatePropagation();
      }

      function onContextMenu(event) {
        if (!editorState.editorActive) return;
        const scene2 = getScene2();
        if (!scene2) return;
        const id = pickObstacleId(scene2, event.clientX, event.clientY);
        if (!id || isObstacleDeleting(id)) return;
        event.preventDefault();
        notifySwift({ type: 'deleteObstacleRequest', obstacleID: id });
      }

      function onPointerDown(event) {
        recordClickHandler('obstacle-capture-pointerDown');
        if (!editorState.editorActive) {
          logObstaclePlace('HANDLER obstacle pointerDown', 'ignored — editorActive=false');
          return;
        }
        logObstaclePlace('HANDLER obstacle pointerDown', 'entered');
        const scene2 = getScene2();
        if (!scene2) {
          logObstaclePlace('pointerDown', 'ignored — scene2 missing');
          return;
        }
        if (event.button !== 0) return;
        if (event.shiftKey) {
          logObstaclePlace('pointerDown', 'ignored — shift+click');
          return;
        }
        const dom = obstaclePointerRoot(scene2);
        if (!dom) {
          logObstaclePlace('pointerDown', 'ignored — no pointer root');
          return;
        }
        const rect = dom.getBoundingClientRect();
        if (
          event.clientX < rect.left || event.clientX > rect.right
          || event.clientY < rect.top || event.clientY > rect.bottom
        ) {
          logObstaclePlace('pointerDown', 'ignored — outside scene');
          return;
        }

        const hitId = pickObstacleId(scene2, event.clientX, event.clientY);
        if (hitId) {
          logObstaclePlace('pointerDown', `obstacle drag start id=${hitId}`);
          cancelPlacementGesture();
          beginObstacleDrag(scene2, dom, event, hitId);
          return;
        }

        cancelPlacementGesture();
        if (editorState.selectedID) {
          logObstaclePlace('pointerDown', `clear selection was=${editorState.selectedID}`);
          if (obstacleDrag) {
            endObstacleDrag(scene2, event, obstacleDrag.moved);
          }
          setSelectedObstacle(scene2, null, true);
          return;
        }
        if (editorState.placementActive) {
          beginPlacementGesture(event.clientX, event.clientY);
        } else {
          logObstaclePlace('pointerDown', `ignored — placementActive=false ${editorFlagsSummary()}`);
        }
      }

      function onPointerMove(event) {
        const scene2 = getScene2();
        if (obstacleDrag && scene2) {
          moveSelected(scene2, event.clientX, event.clientY);
          obstacleDrag.moved = true;
          event.preventDefault();
          return;
        }

        const gesture = placementGesture;
        if (gesture && !gesture.cancelled && !gesture.placed && !gesture.dragged) {
          const moved = Math.hypot(
            event.clientX - gesture.clientX,
            event.clientY - gesture.clientY
          );
          if (moved > PLACEMENT_DRAG_PX) {
            gesture.dragged = true;
            cancelPlacementForShiftOrDrag(`drag > ${PLACEMENT_DRAG_PX}px`);
          }
        }
      }

      function onPointerUp(event) {
        if (event.button !== 0) return;
        const scene2 = getScene2();
        if (obstacleDrag) {
          endObstacleDrag(scene2, event, obstacleDrag.moved);
          event.preventDefault();
          return;
        }

        const gesture = placementGesture;
        if (!gesture) return;
        if (gesture.cancelled) {
          logObstaclePlace('pointerUp', 'gesture was cancelled');
          cancelPlacementGesture();
          return;
        }
        if (gesture.placed) {
          logObstaclePlace('pointerUp', 'gesture already placed');
          cancelPlacementGesture();
          return;
        }
        if (gesture.timerId) {
          clearTimeout(gesture.timerId);
          gesture.timerId = null;
        }
        if (!gesture.dragged && !gesture.shiftHeld) {
          logObstaclePlace('pointerUp', 'release — try place');
          tryPlaceFromGesture('pointerUp');
          return;
        }
        if (gesture.dragged) {
          logObstaclePlace('pointerUp', 'drag — no place');
        } else {
          logObstaclePlace('pointerUp', 'shift held — no place');
        }
        cancelPlacementGesture();
      }

      function obstaclePointerRoot(scene2) {
        return document.getElementById('scene') || scene2?.getDomElement?.() || null;
      }

      function uninstallHandlers() {
        if (pointerDom) {
          pointerDom.removeEventListener('pointerdown', onPointerDown, true);
          pointerDom.removeEventListener('pointermove', onPointerMove, true);
          pointerDom.removeEventListener('pointerup', onPointerUp, true);
          pointerDom.removeEventListener('pointercancel', onPointerUp, true);
          pointerDom.removeEventListener('contextmenu', onContextMenu, true);
          pointerDom = null;
        }
      }

      function installHandlers(scene2) {
        const dom = obstaclePointerRoot(scene2);
        if (!dom) {
          logObstaclePlace('installHandlers', 'no #scene or canvas dom');
          return;
        }
        if (pointerDom === dom) {
          logObstaclePlace('installHandlers', `already bound on #${dom.id || dom.tagName}`);
          return;
        }
        uninstallHandlers();
        dom.addEventListener('pointerdown', onPointerDown, true);
        dom.addEventListener('pointermove', onPointerMove, true);
        dom.addEventListener('pointerup', onPointerUp, true);
        dom.addEventListener('pointercancel', onPointerUp, true);
        dom.addEventListener('contextmenu', onContextMenu, true);
        pointerDom = dom;
        if (!placementKeyListenerInstalled) {
          window.addEventListener('keydown', onPlacementKeyDown, true);
          placementKeyListenerInstalled = true;
        }
        installObstacleDeleteKeyListener();
        const canvas = scene2?.getDomElement?.();
        instrumentGzwebOrbitCanvas(scene2);
        logObstaclePlace(
          'installHandlers',
          `bound on #${dom.id || dom.tagName} canvas=${canvas ? canvas.tagName : 'none'}`
        );
      }

      function routeScenePointer(phase, clientX, clientY) {
        logObstaclePlace(
          'routeScenePointer',
          `${phase} (${Number(clientX).toFixed(0)},${Number(clientY).toFixed(0)}) ${editorFlagsSummary()}`
        );
        if (!editorState.editorActive) {
          logObstaclePlace('routeScenePointer', 'ignored — editorActive=false');
          return;
        }
        const scene2 = getScene2();
        if (!scene2) {
          logObstaclePlace('routeScenePointer', 'ignored — scene2 missing');
          return;
        }
        const dom = obstaclePointerRoot(scene2);
        if (!dom) {
          logObstaclePlace('routeScenePointer', 'ignored — no pointer root');
          return;
        }
        const rect = dom.getBoundingClientRect();
        if (
          clientX < rect.left || clientX > rect.right
          || clientY < rect.top || clientY > rect.bottom
        ) {
          logObstaclePlace('routeScenePointer', 'ignored — outside scene');
          return;
        }
        if (phase === 'down') {
          if (obstacleDrag) return;
          const hitId = pickObstacleId(scene2, clientX, clientY);
          if (hitId) {
            cancelPlacementGesture();
            logObstaclePlace('routeScenePointer', `down on obstacle ${hitId} — use DOM drag`);
            return;
          }
          cancelPlacementGesture();
          if (editorState.selectedID) {
            setSelectedObstacle(scene2, null, true);
            return;
          }
          if (editorState.placementActive) {
            beginPlacementGesture(clientX, clientY);
          }
          return;
        }
        if (phase === 'up') {
          if (obstacleDrag) return;
          const gesture = placementGesture;
          if (!gesture) return;
          if (gesture.cancelled || gesture.placed) {
            cancelPlacementGesture();
            return;
          }
          if (gesture.timerId) {
            clearTimeout(gesture.timerId);
            gesture.timerId = null;
          }
          if (!gesture.shiftHeld) {
            tryPlaceFromGesture('route-up');
          }
          cancelPlacementGesture();
        }
      }

      function placeAtScreen(clientX, clientY) {
        const scene2 = getScene2();
        if (!scene2) return false;
        if (!editorState.editorActive || !editorState.placementActive) {
          logObstaclePlace('placeAtScreen', `blocked ${editorFlagsSummary()}`);
          return false;
        }
        placeNewAt(scene2, clientX, clientY);
        return true;
      }

      return {
        getDebugFlags() {
          return `${editorFlagsSummary()} handlersBound=${Boolean(pointerDom)}`;
        },
        routeScenePointer,
        placeAtScreen,
        attach(manager) {
          const scene2 = manager?.scene;
          if (!scene2) {
            logObstaclePlace('attach', 'skipped — manager.scene missing');
            return;
          }
          installObstaclePoseGuard(scene2);
          removeObstacleGizmo(scene2);
          installHandlers(scene2);
        },
        applyState(state) {
          try {
            postObstaclePlaceDebug('applyState enter');
            const prevDeletingID = editorState.deletingID;
            const prevEditorActive = editorState.editorActive;
            const prevPlacementActive = editorState.placementActive;
            const dragID = obstacleDrag?.id;
            const draggedLive = dragID
              ? editorState.obstacles.find((o) => o.id === dragID)
              : null;
            const defaultZones = {
              start: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
              end: { placed: false, centerXM: 0, centerYM: 0, centerZM: 0, radiusM: 30, shape: 'circle' },
            };
            editorState = {
              editorActive: Boolean(state?.editorActive),
              placementActive: Boolean(state?.placementActive),
              selectedID: state?.selectedID ?? null,
              deletingID: state?.deletingID ?? null,
              draft: state?.draft ?? {},
              obstacles: Array.isArray(state?.obstacles) ? state.obstacles : [],
              mapHalfExtentM: Number(state?.mapHalfExtentM) > 0
                ? Number(state.mapHalfExtentM)
                : MAP_GROUND_HALF_EXTENT_M,
              zones: state?.zones ?? defaultZones,
            };
            if (draggedLive && dragID) {
              const incoming = editorState.obstacles.find((o) => o.id === dragID);
              if (incoming) {
                incoming.centerXM = draggedLive.centerXM;
                incoming.centerYM = draggedLive.centerYM;
                incoming.centerZM = draggedLive.centerZM;
                incoming.yawDeg = draggedLive.yawDeg;
              }
            }
            if (editorState.placementActive && !prevPlacementActive) {
              placementArmedAt = Date.now() + PLACEMENT_ARM_MS;
              logObstaclePlace('applyState', `placement armed for ${PLACEMENT_ARM_MS}ms ${editorFlagsSummary()}`);
            }
            if (editorState.editorActive !== prevEditorActive
              || editorState.placementActive !== prevPlacementActive) {
              logObstaclePlace('applyState flags', `${editorFlagsSummary()} ${draftPlacementSummary()}`);
            }
            cancelPlacementGesture();
            const preserveDrag = obstacleDrag;
            const preserveDragFrame = obstacleDragFrame;
            obstacleDrag = null;
            obstacleDragFrame = 0;
            const scene2 = getScene2();
            if (scene2) {
              if (editorState.editorActive) {
                installHandlers(scene2);
                installObstacleDeleteKeyListener();
                instrumentGzwebOrbitCanvas(scene2);
                setObstaclePlacementModeUI(scene2, editorState.placementActive);
              } else {
                setObstaclePlacementModeUI(scene2, false);
              }
              if (editorState.deletingID && editorState.deletingID !== prevDeletingID) {
                startDeleteFade(scene2, editorState.deletingID);
              } else if (!editorState.deletingID && prevDeletingID) {
                const stillListed = editorState.obstacles.some((o) => o.id === prevDeletingID);
                stopDeleteFade(scene2, { restore: stillListed, id: prevDeletingID });
              }
              purgeOrphanObstacleMeshes(scene2);
              syncObstacleVisualTransforms(scene2);
              rebuildSelectionOutlines(scene2);
            } else {
              logObstaclePlace('applyState', 'scene2 missing — handlers not installed');
            }
            obstacleDrag = preserveDrag;
            obstacleDragFrame = preserveDragFrame;
            if (preserveDrag && scene2) {
              startObstacleDragFollowLoop(scene2);
            }
            logObstaclePlace('applyState done', editorFlagsSummary());
            return true;
          } catch (err) {
            logObstaclePlace('applyState error', err?.message || String(err));
            return false;
          }
        },
      };
    }

    function formatCameraDebugLine(manager) {
      const scene2 = manager?.scene;
      const camera = scene2?.camera;
      const controls = scene2?.controls;
      if (!camera) return 'camera: (not ready)';
      const p = camera.position;
      const t = controls?.target;
      const target = t ? `${t.x.toFixed(2)}, ${t.y.toFixed(2)}, ${t.z.toFixed(2)}` : '—';
      let angles = '';
      if (controls?.getPolarAngle && controls?.getAzimuthalAngle) {
        const polarDeg = (controls.getPolarAngle() * 180) / Math.PI;
        const azimuthDeg = (controls.getAzimuthalAngle() * 180) / Math.PI;
        angles = `  polar ${polarDeg.toFixed(1)}°  azimuth ${azimuthDeg.toFixed(1)}°`;
      }
      return (
        `cam pos  x ${p.x.toFixed(2)}  y ${p.y.toFixed(2)}  z ${p.z.toFixed(2)}\n`
        + `target   ${target}${angles}\n`
        + `OBLIQUE  x ${MAP_OBLIQUE_DIRECTION.x.toFixed(3)}  y ${MAP_OBLIQUE_DIRECTION.y.toFixed(3)}  z ${MAP_OBLIQUE_DIRECTION.z.toFixed(3)}`
      );
    }

    function stopCameraDebugHUD() {
      if (cameraDebugFrame) {
        cancelAnimationFrame(cameraDebugFrame);
        cameraDebugFrame = 0;
      }
      cameraDebug.classList.add('hidden');
      cameraDebug.textContent = '';
    }

    function startCameraDebugHUD() {
      if (!cameraDebugEnabled) {
        stopCameraDebugHUD();
        return;
      }
      if (cameraDebugFrame) return;
      cameraDebug.classList.remove('hidden');
      const loop = () => {
        cameraDebugFrame = requestAnimationFrame(loop);
        const manager = viewerSession?.manager;
        cameraDebug.textContent = formatCameraDebugLine(manager);
      };
      loop();
    }

    async function loadSceneManager() {
      try {
        const mod = await import('./dist/gzweb.bundle.mjs');
        guardianThree = mod;
        zoneEditor.resetThreeCache();
        const SceneManager = mod.SceneManager ?? mod.default?.SceneManager;
        if (SceneManager) return SceneManager;
        throw new Error('SceneManager not found in bundled gzweb');
      } catch (bundledErr) {
        throw new Error(
          'Bundled gzweb failed to load (rebuild the app or run ./scripts/fetch_gzweb_viewer.sh). '
          + (bundledErr?.message || bundledErr)
        );
      }
    }

    function waitUntilReady(manager, timeoutMs) {
      return new Promise((resolve, reject) => {
        const sub = manager.getConnectionStatusAsObservable().subscribe((ready) => {
          if (ready) {
            sub.unsubscribe();
            resolve();
          }
        });
        setTimeout(() => {
          sub.unsubscribe();
          reject(new Error('Scene handshake timed out'));
        }, timeoutMs);
      });
    }

    function patchSceneWorldHandshake(ws, worldName) {
      if (!worldName) return () => {};
      const nativeSend = ws.send.bind(ws);
      ws.send = (payload) => {
        if (typeof payload === 'string') {
          const parts = payload.split(',');
          if (parts[0] === 'scene' && (!parts[1] || parts[1].trim() === '')) {
            parts[1] = worldName;
            nativeSend(parts.join(','));
            return;
          }
        }
        nativeSend(payload);
      };
      return () => { ws.send = nativeSend; };
    }

    function frameSceneWhenReady(manager, attempt = 0, onReady) {
      manager.resize();
      const models = typeof manager.getModels === 'function' ? manager.getModels() : [];
      if (models.length === 0 && attempt < 40) {
        setTimeout(() => frameSceneWhenReady(manager, attempt + 1, onReady), 250);
        return;
      }
      commitViewportFit(manager, 'oblique');
      mapDimensionHud.attach();
      onReady?.();
    }

    async function connectOnce(SceneManager) {
      const wsURL = `ws://127.0.0.1:${port}`;
      const manager = new SceneManager({ elementId: root.id });
      let restoreSend = () => {};
      const onResize = () => {
        manager.resize();
        const camera = manager.scene?.camera;
        if (camera) {
          applyCameraClipPlanes(camera);
        }
        const controls = manager.scene?.controls;
        if (controls) {
          applyOrbitPolicyInteractive(controls);
        }
      };

      const NativeWS = window.WebSocket;
      window.WebSocket = function(url, protocols) {
        const ws = protocols === undefined
          ? new NativeWS(url)
          : new NativeWS(url, protocols);
        if (url === wsURL) {
          restoreSend = patchSceneWorldHandshake(ws, worldOverride);
        }
        return ws;
      };

      try {
        const ready = waitUntilReady(manager, 15000);
        await manager.connect(wsURL);
        await ready;
        window.addEventListener('resize', onResize);
        await new Promise((resolve) => {
          frameSceneWhenReady(manager, 0, resolve);
        });
        setLoading(false);
        return { manager, onResize };
      } catch (err) {
        window.removeEventListener('resize', onResize);
        try { manager.destroy(); } catch (_) { /* retry */ }
        throw err;
      } finally {
        window.WebSocket = NativeWS;
        restoreSend();
      }
    }

    async function connect() {
      setLoading(true);
      if (cameraDebugEnabled) {
        startCameraDebugHUD();
      } else {
        stopCameraDebugHUD();
      }
      try {
        const SceneManager = await loadSceneManager();
        const maxAttempts = 8;
        let lastError = null;
        let active = null;
        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
          try {
            if (active?.manager) {
              window.removeEventListener('resize', active.onResize);
              try { active.manager.destroy(); } catch (_) { /* reconnect */ }
            }
            active = await connectOnce(SceneManager);
            bindViewerSession(active);
            mapDimensionHud.attach();
            zoneEditor.attach(active.manager);
            obstacleEditor.attach(active.manager);
            installSceneTileClickProbe(obstacleEditor);
            if (pendingZoneEditorState) {
              zoneEditor.applyState(pendingZoneEditorState);
            }
            if (pendingObstacleEditorState) {
              obstacleEditor.applyState(pendingObstacleEditorState);
            }
            return;
          } catch (err) {
            lastError = err;
            await new Promise((r) => setTimeout(r, 800 + attempt * 250));
          }
        }
        throw lastError ?? new Error('Could not load scene from simulator');
      } catch (err) {
        showLoadError(
          'Could not load the 3D scene. Stop Gazebo, wait a moment, then preview again. '
          + (err?.message || '')
        );
      }
    }

    connect();
  </script>
